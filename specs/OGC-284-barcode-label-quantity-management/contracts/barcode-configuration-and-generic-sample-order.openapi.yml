openapi: 3.0.3
info:
  title: OGC-284 Barcode Configuration and Workflow Printing Contract
  version: 1.0.0
  description: >
    Contract documentation for endpoints and runtime payloads impacted by
    OGC-284. The current codebase already contains barcode configuration,
    sample-save, and print entrypoints; this contract expands the documented
    request/response model so the remaining Jira/design scope can be implemented
    consistently across sample-creation workflows. Workflow-specific save
    endpoints may vary, but they must converge on the same labels-section and
    post-save printing semantics described in these schemas.

paths:
  /rest/BarcodeConfiguration:
    get:
      summary: Retrieve barcode configuration
      operationId: getBarcodeConfiguration
      responses:
        "200":
          description: Barcode configuration form payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BarcodeConfigurationForm"
    post:
      summary: Save barcode configuration
      operationId: saveBarcodeConfiguration
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BarcodeConfigurationForm"
      responses:
        "200":
          description: Validation failure returns form payload with errors
        "302":
          description: Successful save redirects to /rest/BarcodeConfiguration

  /rest/GenericSampleOrder:
    post:
      summary: Save generic sample order with barcode quantity defaults
      operationId: saveGenericSampleOrder
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenericSampleOrderRequest"
      responses:
        "200":
          description: Generic sample order save result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericSampleOrderResponse"

  /api/barcode/print/{orderId}/{labelType}:
    get:
      summary: Generate PDF for a saved order and label type
      operationId: printBarcodeByOrderAndType
      parameters:
        - in: path
          name: orderId
          required: true
          schema:
            type: string
        - in: path
          name: labelType
          required: true
          schema:
            type: string
            enum: [order, specimen, block, slide, freezer]
      responses:
        "200":
          description: PDF bytes for requested label type
          content:
            application/pdf:
              schema:
                type: string
                format: binary

  /api/barcode/print/{orderId}/{labelType}/{sampleId}:
    get:
      summary: Generate PDF for a saved order, label type, and sample context
      operationId: printBarcodeByOrderTypeAndSample
      parameters:
        - in: path
          name: orderId
          required: true
          schema:
            type: string
        - in: path
          name: labelType
          required: true
          schema:
            type: string
            enum: [order, specimen, block, slide, freezer]
        - in: path
          name: sampleId
          required: true
          schema:
            type: string
      responses:
        "200":
          description: PDF bytes for requested sample-specific label
          content:
            application/pdf:
              schema:
                type: string
                format: binary

components:
  schemas:
    BarcodeConfigurationForm:
      type: object
      description: >
        Administrative labels-domain configuration. For malformed/missing persisted
        numeric values, runtime fallback behavior uses canonical quantity defaults:
        default-label fallback = 1, max-label fallback = 10.
      properties:
        formName:
          type: string
          example: BarcodeConfigurationForm
        numMaxOrderLabels:
          type: integer
          minimum: 0
          maximum: 2000
        numMaxSpecimenLabels:
          type: integer
          minimum: 0
          maximum: 2000
        numMaxSlideLabels:
          type: integer
          minimum: 0
          maximum: 2000
        numMaxBlockLabels:
          type: integer
          minimum: 0
          maximum: 2000
        numMaxFreezerLabels:
          type: integer
          minimum: 0
          maximum: 2000
        numDefaultOrderLabels:
          type: integer
          minimum: 0
          maximum: 2000
        numDefaultSpecimenLabels:
          type: integer
          minimum: 0
          maximum: 2000
        numDefaultSlideLabels:
          type: integer
          minimum: 0
          maximum: 2000
        numDefaultBlockLabels:
          type: integer
          minimum: 0
          maximum: 2000
        numDefaultFreezerLabels:
          type: integer
          minimum: 0
          maximum: 2000
        heightOrderLabels:
          type: number
          format: float
        widthOrderLabels:
          type: number
          format: float
        heightSpecimenLabels:
          type: number
          format: float
        widthSpecimenLabels:
          type: number
          format: float
        heightSlideLabels:
          type: number
          format: float
        widthSlideLabels:
          type: number
          format: float
        heightBlockLabels:
          type: number
          format: float
        widthBlockLabels:
          type: number
          format: float
        heightFreezerLabels:
          type: number
          format: float
        widthFreezerLabels:
          type: number
          format: float
        orderPatientDobCheck:
          type: boolean
        orderPatientIdCheck:
          type: boolean
        orderPatientNameCheck:
          type: boolean
        orderSiteIdCheck:
          type: boolean
        specimenPatientDobCheck:
          type: boolean
        specimenPatientIdCheck:
          type: boolean
        specimenPatientNameCheck:
          type: boolean
        specimenCollectionDateCheck:
          type: boolean
        specimenCollectedByCheck:
          type: boolean
        specimenTestsCheck:
          type: boolean
        specimenPatientSexCheck:
          type: boolean
        slidePatientIdCheck:
          type: boolean
        slideSlideIdCheck:
          type: boolean
        slideStainTypeCheck:
          type: boolean
        slideBlockIdCheck:
          type: boolean
        slideCaseNumberCheck:
          type: boolean
        blockPatientIdCheck:
          type: boolean
        blockBlockIdCheck:
          type: boolean
        blockSpecimenTypeCheck:
          type: boolean
        blockCaseNumberCheck:
          type: boolean
        freezerPatientIdCheck:
          type: boolean
        freezerStorageLocationCheck:
          type: boolean
        freezerSpecimenTypeCheck:
          type: boolean
        freezerCollectionDateCheck:
          type: boolean
        freezerExpiryDateCheck:
          type: boolean
        prePrintDontUseAltAccession:
          type: boolean
        prePrintAltAccessionPrefix:
          type: string
          minLength: 0
          maxLength: 4

    GenericSampleOrderRequest:
      type: object
      properties:
        defaultFields:
          $ref: "#/components/schemas/GenericSampleDefaultFields"
        notebookId:
          type: integer
          nullable: true
        notebookEntryId:
          type: integer
          nullable: true
        fhirQuestionnaire:
          type: object
          nullable: true
        fhirResponses:
          type: object
          additionalProperties: true
      required:
        - defaultFields

    GenericSampleDefaultFields:
      type: object
      description: >
        Generic sample order default fields for this endpoint. If omitted,
        `numOrderLabels` and `numSpecimenLabels` default to 1. Other workflows
        may expose additional label quantity fields using the same runtime
        semantics documented by `LabelsSectionModel`.
      properties:
        labNo:
          type: string
        sampleTypeId:
          type: string
        quantity:
          type: string
        sampleUnitOfMeasure:
          type: string
        from:
          type: string
        collector:
          type: string
        collectionDate:
          type: string
        collectionTime:
          type: string
        numOrderLabels:
          type: integer
          description: Optional; defaults to 1 when omitted
          minimum: 1
          default: 1
        numSpecimenLabels:
          type: integer
          description: Optional; defaults to 1 when omitted
          minimum: 1
          default: 1

    GenericSampleOrderResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        error:
          type: string
        sampleId:
          type: string
        sampleItemId:
          type: string
        accessionNumber:
          type: string
        labelsSection:
          $ref: "#/components/schemas/LabelsSectionModel"
        postSavePrintDialog:
          $ref: "#/components/schemas/PostSavePrintDialogModel"

    LabelsSectionModel:
      type: object
      description: >
        Canonical pre-save labels-step/section shape used by all supported
        barcode-printing sample-creation workflows.
      properties:
        orderRow:
          $ref: "#/components/schemas/LabelRow"
        sampleRows:
          type: array
          items:
            $ref: "#/components/schemas/LabelRow"
        runningTotal:
          type: integer
          minimum: 0
      required:
        - orderRow
        - sampleRows
        - runningTotal

    LabelRow:
      type: object
      properties:
        rowType:
          type: string
          enum: [order, sample]
        rowId:
          type: string
        sampleRef:
          type: string
          nullable: true
        applicableLabelTypes:
          type: array
          items:
            type: string
            enum: [order, specimen, block, slide, freezer]
        quantities:
          type: object
          additionalProperties:
            type: integer
            minimum: 0
        rowTotal:
          type: integer
          minimum: 0
      required:
        - rowType
        - rowId
        - applicableLabelTypes
        - quantities
        - rowTotal

    PostSavePrintDialogModel:
      type: object
      description: >
        Canonical post-save print dialog state shown after accession number
        assignment.
      properties:
        accessionNumber:
          type: string
        printableLabelTypes:
          type: array
          items:
            $ref: "#/components/schemas/PrintableLabelOption"
        allowSkipPrintLater:
          type: boolean
          default: true
        reprintContextToken:
          type: string
          nullable: true
      required:
        - accessionNumber
        - printableLabelTypes
        - allowSkipPrintLater

    PrintableLabelOption:
      type: object
      properties:
        labelType:
          type: string
          enum: [order, specimen, block, slide, freezer]
        quantity:
          type: integer
          minimum: 0
        dimensionsMm:
          type: string
          description: Human-readable configured dimensions, e.g. "25 x 50"
        printUrl:
          type: string
          description: Runtime URL for selected label type PDF generation
        selected:
          type: boolean
        printerSelection:
          type: string
          nullable: true
      required:
        - labelType
        - quantity
        - dimensionsMm
        - printUrl
        - selected
