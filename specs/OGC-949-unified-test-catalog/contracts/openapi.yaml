openapi: 3.0.3
info:
  title: Test Catalog Editor — Foundation + shipped sections (OGC-949 v1)
  version: 0.2.0-draft
  description: >
    Foundation envelope plus the sections shipped to date. Section-specific
    request/response schemas are appended at each milestone's ELABORATE gate
    (see tasks.md); unshipped sections stay the generic opaque per-section
    envelope. All endpoints require ROLE_ADMIN
    (@PreAuthorize("hasRole('ADMIN')")); non-admins receive 403, unauthenticated
    callers 401 (FR-004).
    GROUNDING (2026-06-14, research.md R15 — supersedes R10): the editor base
    path is /rest/test-catalog (class-level @RequestMapping on
    TestCatalogEditorRestController), NOT the provisional /rest/tests. The
    M0-ported Methods API lives on a separate base, /rest/test/{testId}/methods
    (TestMethodRestController; hardened in PR #3714 — research.md R12); its full
    request/response schemas are elaborated at M6. SecurityConfig guards all REST
    under "/rest/**".
servers:
  - url: /rest
    description: OpenELIS REST base (traditional Spring MVC; SecurityConfig guards /rest/**)
security:
  - sessionAuth: []
paths:
  /test-catalog/tests:
    get:
      summary: Test List View — filtered, paginated list (OGC-928) [IMPLEMENTED, M3]
      description: >
        Implemented filters: domain, status, amr, search. The section /
        sampleType / resultType params and full URL-state sync are RM11
        follow-ups (see tasks.md "Post-merge remediation"). Note: filtering/
        sorting is in-memory today; a DB projection is deferred (RM12 / R12).
      parameters:
        - { name: section, in: query, schema: { type: string }, description: "RM11 follow-up — not yet applied" }
        - { name: sampleType, in: query, schema: { type: string }, description: "RM11 follow-up — not yet applied" }
        - { name: resultType, in: query, schema: { type: string }, description: "RM11 follow-up — not yet applied" }
        - { name: status, in: query, schema: { type: string, enum: [active, inactive, all], default: all } }
        - { name: domain, in: query, schema: { type: string, enum: [CLINICAL, ENVIRONMENTAL, VECTOR] } }
        - { name: amr, in: query, schema: { type: boolean } }
        - { name: page, in: query, schema: { type: integer, minimum: 1, default: 1 } }
        - { name: pageSize, in: query, schema: { type: integer, minimum: 1, default: 25 } }
      responses:
        "200":
          description: A page of test list rows.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/TestListPage" }
        "403": { $ref: "#/components/responses/Forbidden" }
  /test-catalog/tests/{testId}:
    get:
      summary: Load a test's editor envelope (shell hydration) [IMPLEMENTED, M2]
      parameters:
        - { name: testId, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: Editor envelope — identity + which sections apply for this test's domain.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/TestEditorEnvelope" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { description: No such test. }
  /test-catalog/tests/{testId}/basic-info:
    get:
      summary: Load Basic Info section [IMPLEMENTED, M4]
      parameters:
        - { name: testId, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: Basic Info payload.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/BasicInfo" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { description: No such test. }
    put:
      summary: Save Basic Info section [IMPLEMENTED, M4]
      description: >
        Partial update — only fields present in the body are applied (boxed
        Boolean / apply-if-present, PR #3714 / R12). Name / Reporting Name /
        Code / Description are read-only in v1 (OGC-950 / RM13); submitting a
        changed value for them yields 422.
      parameters:
        - { name: testId, in: path, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/BasicInfo" }
      responses:
        "200":
          description: Saved; returns the persisted Basic Info.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/BasicInfo" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { description: No such test. }
        "422": { description: Invalid domain enum, or an attempt to change an immutable field (name/code/description). }
  /test-catalog/tests/{testId}/analyzers:
    get:
      summary: Load the read-only Analyzers list [IMPLEMENTED, M11]
      description: >
        Read-only — the analyzers that can run this test, derived from analyzer
        test-code mappings (analyzer_test_map). The source of truth is the
        analyzer record, edited on the Analyzer configuration surface; there is
        no PUT here (OGC-959 / OGC-960).
      parameters:
        - { name: testId, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: The analyzers mapped to this test (possibly empty).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AnalyzersResponse" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { description: No such test. }
  /test-catalog/sample-types:
    get:
      summary: List sample types for the Display Order picker [IMPLEMENTED, M12]
      description: >
        Display Order (OGC-983..985) is sample-type-scoped, not test-scoped — a
        test can sit at a different position in Serum vs Plasma — so these paths
        intentionally diverge from the /tests/{testId}/{section} shape.
      responses:
        "200":
          description: Sample types (sort-ordered).
          content:
            application/json:
              schema: { type: array, items: { $ref: "#/components/schemas/SampleTypeOption" } }
        "403": { $ref: "#/components/responses/Forbidden" }
  /test-catalog/sample-types/{sampleTypeId}/test-order:
    get:
      summary: Load tests ordered within a sample type [IMPLEMENTED, M12]
      parameters:
        - { name: sampleTypeId, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: Tests in this sample type, sorted by display order (nulls last).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DisplayOrderResponse" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { description: No such sample type. }
    put:
      summary: Save the per-sample-type display order (auto-save on reorder) [IMPLEMENTED, M12]
      description: >
        Persists sampletype_test.display_order (OGC-985). Only the tests named in
        the body are updated; positions are 1-based.
      parameters:
        - { name: sampleTypeId, in: path, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/DisplayOrderUpdate" }
      responses:
        "200":
          description: Saved; returns the re-read order.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DisplayOrderResponse" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { description: No such sample type. }
  /test-catalog/tests/{testId}/terminology:
    get:
      summary: Load terminology mappings [IMPLEMENTED, M10]
      parameters:
        - { name: testId, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: The test's active terminology mappings.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/TerminologyResponse" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { description: No such test. }
    put:
      summary: Save terminology mappings [IMPLEMENTED, M10]
      description: >
        Reconciles to the desired set (insert / reactivate / soft-delete), keyed
        on (source, code). source ∈ LOINC/SNOMED/CIEL/OCL; relationship ∈
        SAME_AS/BROADER_THAN/NARROWER_THAN.
      parameters:
        - { name: testId, in: path, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/TerminologyResponse" }
      responses:
        "200":
          description: Saved; returns the active mappings.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/TerminologyResponse" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { description: No such test. }
        "422": { description: Unknown source/relationship, or a duplicate (source, code) in the request. }
  /test-catalog/panels:
    get:
      summary: List panels for the add-to-panel typeahead [IMPLEMENTED, M9]
      responses:
        "200":
          description: Active panels.
          content:
            application/json:
              schema: { type: array, items: { $ref: "#/components/schemas/PanelOption" } }
        "403": { $ref: "#/components/responses/Forbidden" }
  /test-catalog/panels/{panelId}/test-order:
    get:
      summary: A panel's tests in order — preview for the position editor [IMPLEMENTED, M9]
      parameters:
        - { name: panelId, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: Tests in the panel, ordered.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PanelTestOrderResponse" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { description: No such panel. }
  /test-catalog/tests/{testId}/panels:
    get:
      summary: This test's panel memberships [IMPLEMENTED, M9]
      parameters:
        - { name: testId, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: The panels this test belongs to, with its position in each.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/TestPanelsResponse" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { description: No such test. }
    put:
      summary: Set this test's panel memberships + positions [IMPLEMENTED, M9]
      description: >
        Adds/removes memberships and writes this test's position per panel.
        Siblings are not renumbered (full panel renumbering stays in Panel
        Management). Create-panel is not inline — panels are created in Master
        Lists where their sample-type + ordering modules are configured.
      parameters:
        - { name: testId, in: path, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/PanelMembershipUpdate" }
      responses:
        "200":
          description: Saved; returns the test's memberships.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/TestPanelsResponse" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { description: No such test. }
  /test-catalog/tests/{testId}/{section}:
    get:
      summary: Load one editor section's data (generic — UNSHIPPED sections)
      description: >
        Generic per-section read for sections not yet elaborated. `section` is a
        v1 section key. basic-info is concrete above; the rest are opaque until
        their milestone's ELABORATE gate fills in the schema.
      parameters:
        - { name: testId, in: path, required: true, schema: { type: string } }
        - { name: section, in: path, required: true, schema: { $ref: "#/components/schemas/SectionKey" } }
      responses:
        "200":
          description: Section payload (section-specific; opaque at foundation stage).
          content:
            application/json:
              schema: { type: object, additionalProperties: true }
        "403": { $ref: "#/components/responses/Forbidden" }
    put:
      summary: Save one editor section (generic — UNSHIPPED sections)
      parameters:
        - { name: testId, in: path, required: true, schema: { type: string } }
        - { name: section, in: path, required: true, schema: { $ref: "#/components/schemas/SectionKey" } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { type: object, additionalProperties: true }
      responses:
        "200":
          description: Saved; returns the section payload (may include coverage warnings for ranges).
          content:
            application/json:
              schema: { type: object, additionalProperties: true }
        "403": { $ref: "#/components/responses/Forbidden" }
        "422":
          description: Validation failure (e.g. missing domain; free-text unit rejected).
  /test-catalog/tests/{testId}/activate:
    post:
      summary: Activate a test — gated by range coverage (FR-012) [PLANNED — not yet implemented; M7]
      description: >
        Warns on save (elsewhere) but blocks activation when coverage gaps exist
        unless an acknowledgment is supplied. A successful gapped activation
        writes a test_activation_acknowledgment audit row. Not yet implemented —
        the M4 activation-gate is stubbed until M7 (Ranges).
      parameters:
        - { name: testId, in: path, required: true, schema: { type: string } }
      requestBody:
        required: false
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ActivationAck" }
      responses:
        "200": { description: Activated (acknowledgment logged if gaps were present). }
        "409":
          description: Coverage gaps present and no acknowledgment supplied — activation blocked.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CoverageGaps" }
        "403": { $ref: "#/components/responses/Forbidden" }
  /test-catalog/tests/{testId}/clone:
    post:
      summary: Save as new test… (clone) (OGC-944 / US2) [PLANNED — stub; M2 T205]
      description: Editor header CTA exists; the clone modal + this endpoint are the open M2 follow-up (currently a stub notification).
      parameters:
        - { name: testId, in: path, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, code]
              properties:
                name: { type: string }
                code: { type: string }
      responses:
        "201":
          description: New test created from the source's configuration.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/TestEditorEnvelope" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "422": { description: Name/Code invalid or duplicate. }

  # ─────────────────────────────────────────────────────────────────────────
  # Methods API — ported in M0 from demo-silnas (#3706), hardened in PR #3714
  # (research.md R12/R13). Separate base /rest/test/{testId}/methods (singular).
  # Documented here for traceability; full schemas land at M6 ELABORATE.
  # ─────────────────────────────────────────────────────────────────────────
  /test/{testId}/methods:
    get:
      summary: List the methods linked to a test [IMPLEMENTED, M0]
      parameters:
        - { name: testId, in: path, required: true, schema: { type: string } }
      responses:
        "200": { description: Linked-method DTOs (id, methodId, methodName, methodCode, isDefault, effectiveDate). }
        "401": { description: Unauthenticated. }
        "403": { $ref: "#/components/responses/Forbidden" }
    post:
      summary: Link an existing method to a test [IMPLEMENTED, M0; hardened #3714]
      parameters:
        - { name: testId, in: path, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [methodId]
              properties:
                methodId: { type: string }
                isDefault: { type: boolean }
                effectiveDate: { type: string, description: "ISO date; malformed → 422" }
      responses:
        "201": { description: Link created (DTO returned). }
        "403": { $ref: "#/components/responses/Forbidden" }
        "409": { description: A duplicate active (test, method) link already exists. }
        "422": { description: Malformed effectiveDate. }
  /test/{testId}/methods/inline-create:
    post:
      summary: Create a method in Master Lists and link it in one action [IMPLEMENTED, M0]
      parameters:
        - { name: testId, in: path, required: true, schema: { type: string } }
      responses:
        "201": { description: Method created + linked (DTO returned). }
        "403": { $ref: "#/components/responses/Forbidden" }
        "409": { description: Constraint violation (e.g. duplicate). }
        "422": { description: Validation failure (e.g. method code > 20 chars, malformed date). }
  /test/{testId}/methods/{id}:
    patch:
      summary: Update a link (set default / effective date) [IMPLEMENTED, M0; hardened #3714]
      parameters:
        - { name: testId, in: path, required: true, schema: { type: string } }
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        "200": { description: Link updated. }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { description: Unknown link id, or a link id that belongs to a different test. }
        "422": { description: Malformed effectiveDate. }
    delete:
      summary: Remove (soft-delete) a link [IMPLEMENTED, M0; hardened #3714]
      parameters:
        - { name: testId, in: path, required: true, schema: { type: string } }
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        "200": { description: Link removed. }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { description: Unknown link id, or a link id that belongs to a different test. }
  /test/{testId}/methods/copyFrom/{sourceTestId}:
    post:
      summary: Copy method links from another test [IMPLEMENTED, M0]
      parameters:
        - { name: testId, in: path, required: true, schema: { type: string } }
        - { name: sourceTestId, in: path, required: true, schema: { type: string } }
      responses:
        "200": { description: Methods copied. }
        "403": { $ref: "#/components/responses/Forbidden" }
components:
  securitySchemes:
    sessionAuth:
      type: apiKey
      in: cookie
      name: JSESSIONID
  responses:
    Forbidden:
      description: Caller lacks ROLE_ADMIN (FR-004).
  schemas:
    AnalyzersResponse:
      type: object
      description: Read-only analyzers for a test (M11 / OGC-959).
      properties:
        testId: { type: string }
        analyzers:
          type: array
          items: { $ref: "#/components/schemas/AnalyzerRow" }
    AnalyzerRow:
      type: object
      description: One analyzer that can run this test, derived from analyzer_test_map.
      properties:
        analyzerId: { type: string }
        analyzerName: { type: string }
        analyzerTestName: { type: string }
    SampleTypeOption:
      type: object
      description: A selectable sample type for the Display Order picker (M12).
      properties:
        id: { type: string }
        name: { type: string }
    TestOrderRow:
      type: object
      properties:
        testId: { type: string }
        testName: { type: string }
        displayOrder: { type: integer, nullable: true }
    DisplayOrderResponse:
      type: object
      properties:
        sampleTypeId: { type: string }
        tests:
          type: array
          items: { $ref: "#/components/schemas/TestOrderRow" }
    DisplayOrderUpdate:
      type: object
      description: Desired display order for tests within a sample type (M12 / OGC-985).
      properties:
        items:
          type: array
          items:
            type: object
            properties:
              testId: { type: string }
              displayOrder: { type: integer }
    PanelOption:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
    PanelMembership:
      type: object
      properties:
        panelId: { type: string }
        panelName: { type: string }
        position: { type: integer, nullable: true }
    TestPanelsResponse:
      type: object
      properties:
        testId: { type: string }
        memberships:
          type: array
          items: { $ref: "#/components/schemas/PanelMembership" }
    PanelTestRow:
      type: object
      properties:
        testId: { type: string }
        testName: { type: string }
        position: { type: integer, nullable: true }
    PanelTestOrderResponse:
      type: object
      properties:
        panelId: { type: string }
        tests:
          type: array
          items: { $ref: "#/components/schemas/PanelTestRow" }
    PanelMembershipUpdate:
      type: object
      description: Desired panel memberships for a test (M9 / OGC-980..982).
      properties:
        memberships:
          type: array
          items:
            type: object
            properties:
              panelId: { type: string }
              position: { type: integer, nullable: true }
    MappingDto:
      type: object
      properties:
        id: { type: string, nullable: true }
        source: { type: string, enum: [LOINC, SNOMED, CIEL, OCL] }
        code: { type: string }
        relationship: { type: string, enum: [SAME_AS, BROADER_THAN, NARROWER_THAN], nullable: true }
    TerminologyResponse:
      type: object
      description: A test's terminology mappings (M10 / OGC-957).
      properties:
        testId: { type: string }
        mappings:
          type: array
          items: { $ref: "#/components/schemas/MappingDto" }
    SectionKey:
      type: string
      enum:
        [
          basic-info,
          sample-results,
          methods,
          ranges,
          storage,
          panels,
          terminology,
          analyzers,
          display-order,
        ]
    TestListPage:
      type: object
      properties:
        page: { type: integer }
        pageSize: { type: integer }
        total: { type: integer }
        rows:
          type: array
          items: { $ref: "#/components/schemas/TestListRow" }
    TestListRow:
      type: object
      properties:
        testId: { type: string }
        name: { type: string }
        code: { type: string }
        domain: { type: string, enum: [CLINICAL, ENVIRONMENTAL, VECTOR] }
        active: { type: boolean }
        amr: { type: boolean }
        coverageIncomplete:
          {
            type: boolean,
            description: "Drives the Coverage-incomplete Tag (US3); backend returns false until M7 Ranges wires it.",
          }
    BasicInfo:
      type: object
      description: Basic Info section payload (GET/PUT). Name/code/description read-only in v1 (OGC-950).
      properties:
        name: { type: string, description: "read-only in v1 (OGC-950 / RM13)" }
        reportingName: { type: string, description: "read-only in v1" }
        code: { type: string, description: "read-only in v1" }
        description: { type: string, description: "read-only in v1" }
        domain: { type: string, enum: [CLINICAL, ENVIRONMENTAL, VECTOR] }
        antimicrobialResistance: { type: boolean, description: "AMR flag; reuses TEST.ANTIMICROBIAL_RESISTANCE (R11)" }
        active: { type: boolean }
        orderable: { type: boolean }
    TestEditorEnvelope:
      type: object
      properties:
        testId: { type: string }
        name: { type: string }
        code: { type: string }
        domain: { type: string, enum: [CLINICAL, ENVIRONMENTAL, VECTOR] }
        applicableSections:
          type: array
          description: "v1 section keys visible for this test's domain (Compliance is v2, always hidden in v1)."
          items: { $ref: "#/components/schemas/SectionKey" }
    ActivationAck:
      type: object
      properties:
        acknowledgeGaps: { type: boolean }
        gaps:
          type: array
          items: { type: string }
    CoverageGaps:
      type: object
      properties:
        gaps:
          type: array
          items:
            type: object
            properties:
              sex: { type: string, enum: [MALE, FEMALE, ALL] }
              ageWindow: { type: string }
