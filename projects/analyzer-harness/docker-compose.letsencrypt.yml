# Let's Encrypt override for analyzer harness (analyzers.openelis-global.org).
# Uses the repo's volume/letsencrypt so valid certs (from docs/LETSENCRYPT_SETUP.md)
# are shared. Must list all proxy volumes here (override replaces, not merges).
# Generate certs from repo root: LETSENCRYPT_DOMAIN=analyzers.openelis-global.org ./scripts/generate-letsencrypt-certs.sh

services:
  proxy:
    volumes:
      - certs-vol:/etc/nginx/certs/
      - keys-vol:/etc/nginx/keys/
      - ./volume/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ../../volume/nginx/certbot:/var/www/certbot
      - ../../volume/letsencrypt:/etc/letsencrypt:ro
      - ../../nginx-proxy/docker-entrypoint.sh:/docker-entrypoint.sh:ro
    environment:
      - LETSENCRYPT_DOMAIN=${LETSENCRYPT_DOMAIN:-analyzers.openelis-global.org}
    entrypoint: ["/bin/sh", "/docker-entrypoint.sh"]
