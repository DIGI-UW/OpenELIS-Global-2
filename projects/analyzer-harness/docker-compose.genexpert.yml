# GeneXpert ASTM Testing Overlay
#
# Reconfigures the bridge to connect to the GeneXpert simulator instead of
# the default HEMATOLOGY mock. Use alongside docker-compose.analyzer-test.yml
# with the genexpert profile:
#
#   docker compose -f docker-compose.dev.yml \
#                  -f docker-compose.analyzer-test.yml \
#                  -f docker-compose.genexpert.yml \
#                  --profile genexpert up -d
#
# Message flow (pull mode — bridge connects to mock):
#   genexpert-simulator:5000 ← bridge connects as ASTM client
#   bridge → OE /api/OpenELIS-Global/analyzer/astm
#
# Message flow (push mode — triggered via HTTP API):
#   POST http://localhost:8085/simulate/astm/genexpert_astm
#     body: {"destination": "tcp://openelis-analyzer-bridge:12001", "count": 1}
#   genexpert-simulator → bridge:12001 (raw ASTM TCP with ENQ/ACK framing)
#   bridge → OE /api/OpenELIS-Global/analyzer/astm

services:
  # Override bridge to connect to GeneXpert simulator for pull-based flow
  openelis-analyzer-bridge:
    environment:
      - ORG_ITECH_AHB_FORWARD_ASTM_SERVER_HOST_NAME=genexpert-simulator
      - ORG_ITECH_AHB_FORWARD_ASTM_SERVER_PORT=5000
    depends_on:
      genexpert-simulator:
        condition: service_healthy
