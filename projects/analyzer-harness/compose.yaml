# Analyzer Harness — core stack (Compose Specification).
#
# This is the base harness environment: certs, db, oe (backend), fhir,
# frontend, proxy. Analyzer E2E services (astm-simulator, bridge,
# virtual-serial) live in compose.harness.yaml under the `harness` profile.
#
# Usage:
#   docker compose up -d                                                # core harness only
#   docker compose -f compose.yaml -f compose.harness.yaml --profile harness up -d  # core + analyzer E2E
#   docker compose -f compose.yaml -f compose.letsencrypt.yaml up -d    # core + LE certs
#
# Merged from the former docker-compose.base.yml + docker-compose.dev.yml
# during the Round 3 Docker modernization (chore/docker-compose-modernization).

services:
  certs:
    container_name: oe-certs
    image: itechuw/certgen:main
    platform: linux/amd64
    restart: "no"
    environment:
      KEYSTORE_PW: '"kspass"'
      TRUSTSTORE_PW: '"tspass"'
    volumes:
      - key_trust-store-volume:/etc/openelis-global
      - keys-vol:/etc/ssl/private/
      - certs-vol:/etc/ssl/certs/

  db.openelis.org:
    container_name: openelisglobal-database
    image: postgres:14.4
    ports:
      - "15432:5432"
    restart: always
    env_file:
      - ./volume/database/database.env
    environment:
      DB_PASSWORD: ${OE_DB_PASSWORD:-clinlims}
      DB_SUPERUSER_PASSWORD: ${ADMIN_PASSWORD:-superuser}
    volumes:
      - db-data:/var/lib/postgresql/data
      - ./volume/database/dbInit:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "pg_isready", "-q", "-d", "clinlims", "-U", "clinlims"]
      timeout: 45s
      interval: 10s
      retries: 10

  oe.openelis.org:
    container_name: openelisglobal-webapp
    image: itechuw/openelis-global-2-dev:develop
    # Local build: `docker compose build oe.openelis.org` rebuilds this image
    # from the branch's consolidated multi-stage Dockerfile (target: dev),
    # overriding the pulled :develop image tag. See ../../Dockerfile for stages.
    build:
      context: ../..
      dockerfile: Dockerfile
      target: dev
    depends_on:
      db.openelis.org:
        condition: service_healthy
      certs:
        condition: service_started
      fhir.openelis.org:
        condition: service_healthy
    restart: always
    ports:
      - "8080:8080"
      - "8443:8443"
    environment:
      DEFAULT_PW: adminADMIN!
      TZ: Africa/Nairobi
      SPRING_LIQUIBASE_CONTEXTS: test
      CATALINA_OPTS: -Ddatasource.url=jdbc:postgresql://db.openelis.org:5432/clinlims -Ddatasource.username=clinlims -Dspring.liquibase.contexts=test
      JDK_JAVA_OPTIONS: -Djdk.internal.httpclient.disableHostnameVerification=true
    volumes:
      - key_trust-store-volume:/etc/openelis-global
      - lucene_index-vol:/var/lib/lucene_index
      - ../../target/OpenELIS-Global.war:/usr/local/tomcat/webapps/OpenELIS-Global.war
      - ../../volume/tomcat/oe_server.xml:/usr/local/tomcat/conf/server.xml
      - ./volume/plugins:/var/lib/openelis-global/plugins
      - ./volume/programs:/var/lib/openelis-global/programs
      - ./volume/logs/oeLogs:/var/lib/openelis-global/logs
      - ./volume/logs/tomcatLogs:/usr/local/tomcat/logs
      - ./volume/properties/SystemConfiguration.properties:/var/lib/openelis-global/properties/SystemConfiguration.properties
      - ./volume/analyzer/analyzer-test-map.csv:/var/lib/openelis-global/analyzer/analyzer-test-map.csv
      - ./volume/configuration:/var/lib/openelis-global/configuration
      - ./volume/menu/menu_config.json:/var/lib/openelis-global/menu/menu_config.json
      - ./volume/analyzer-imports:/data/analyzer-imports
      - ../../projects/analyzer-profiles:/data/analyzer-profiles:ro
    networks:
      default:
        ipv4_address: 172.20.1.121
    healthcheck:
      test: ["CMD", "/healthcheck.sh"]
      timeout: 10s
      interval: 30s
      retries: 3
      start_period: 2m
    secrets:
      - source: datasource.password
      - source: common.properties

  fhir.openelis.org:
    container_name: external-fhir-api
    image: hapiproject/hapi:v6.6.0-tomcat
    depends_on:
      db.openelis.org:
        condition: service_started
      certs:
        condition: service_started
    restart: always
    ports:
      - "8081:8080"
      - "8444:8443"
    environment:
      SPRING_CONFIG_LOCATION: file:///run/secrets/hapi_application.yaml
      TZ: Africa/Nairobi
      JAVA_OPTS: "-Djavax.net.ssl.trustStore=/etc/openelis-global/truststore
                  -Djavax.net.ssl.trustStorePassword=tspass
                  -Djavax.net.ssl.trustStoreType=pkcs12
                  -Djavax.net.ssl.keyStore=/etc/openelis-global/keystore
                  -Djavax.net.ssl.keyStorePassword=kspass
                  -Djavax.net.ssl.keyStoreType=pkcs12"
    volumes:
      - key_trust-store-volume:/etc/openelis-global
      - ../../tomcat/hapi_server.xml:/opt/bitnami/tomcat/conf/server.xml
    secrets:
      - source: hapi_application.yaml
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f org.apache.catalina.startup.Bootstrap >/dev/null"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 60s

  frontend.openelis.org:
    container_name: openelisglobal-front-end
    image: itechuw/openelis-global-2-frontend-dev:develop
    # Local-dev default: `target: dev` selects the Vite dev-server stage of
    # the consolidated multi-stage frontend/Dockerfile (HMR + unminified React).
    # For CI-parity (ship-artifact) mode, use compose.ci or build.target:runtime.
    build:
      context: ../../frontend
      dockerfile: Dockerfile
      target: dev
    volumes:
      - ../../frontend/src:/app/src
      - ../../frontend/public:/app/public
    environment:
      CHOKIDAR_USEPOLLING: "true"
    tty: true

  proxy:
    container_name: openelisglobal-proxy
    image: nginx:1.27-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - certs-vol:/etc/nginx/certs/
      - keys-vol:/etc/nginx/keys/
      - ./volume/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ../../volume/nginx/certbot:/var/www/certbot
      - ../../volume/letsencrypt:/etc/letsencrypt:ro
    restart: unless-stopped
    depends_on:
      certs:
        condition: service_started
      oe.openelis.org:
        condition: service_started

secrets:
  datasource.password:
    file: ./volume/properties/datasource.password
  common.properties:
    file: ./volume/properties/common.properties
  hapi_application.yaml:
    file: ./volume/properties/hapi_application.yaml

networks:
  default:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.1.0/24

volumes:
  db-data:
  key_trust-store-volume:
  certs-vol:
  keys-vol:
  lucene_index-vol:
