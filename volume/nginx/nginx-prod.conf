worker_processes 1;

events { worker_connections 1024; }

http {
    server {
        listen 80;
        server_name _;
        
        # Redirect /openelis to /openelis/ for consistency
        location = /openelis {
            return 301 /openelis/;
        }
        
        # Frontend - Static build served by nginx
        location /openelis/ {
            proxy_pass http://frontend.openelis.org:80/;
            proxy_redirect off;
            
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $server_name;
            
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }
        
        # Backend API
        location /openelis/api/ {
            proxy_pass https://oe.openelis.org:8443/openelis/api/;
            proxy_redirect off;
            proxy_ssl_verify off;
            proxy_ssl_server_name on;
            
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $server_name;
            
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
            proxy_buffer_size 128k;
            proxy_buffers 4 256k;
            proxy_busy_buffers_size 256k;
        }
        
        # Backend REST
        location /openelis/rest/ {
            proxy_pass https://oe.openelis.org:8443/openelis/rest/;
            proxy_redirect off;
            proxy_ssl_verify off;
            proxy_ssl_server_name on;
            
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }
        
        # FHIR API
        location /openelis/fhir/ {
            proxy_pass http://fhir.openelis.org:8080/fhir-server/api/v4/;
            proxy_redirect off;
            
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }
    }
}