worker_processes 1;

events { worker_connections 1024; }
http {
    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    server {
        listen [::]:443 ssl;
        listen 443 ssl default;
        server_name __;

        ssl_certificate /etc/nginx/certs/apache-selfsigned.crt;
        ssl_certificate_key /etc/nginx/keys/apache-selfsigned.key;
        
        # Add HTTP security headers here (HSTS, CSP, X-Frame-Options, etc.)
        # Enforce browser security protections (CSP, HSTS, clickjacking, MIME sniffing)
        # Required to mitigate XSS, clickjacking, and data leakage risks (P5-D)
       
        server_tokens off;

        add_header Strict-Transport-Security  "max-age=31536000; includeSubDomains" always;
        add_header X-Frame-Options            "SAMEORIGIN" always;
        add_header X-Content-Type-Options     "nosniff" always;
        add_header Referrer-Policy            "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy         "camera=(), microphone=(), geolocation=()" always;
        add_header Content-Security-Policy    "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self'; frame-ancestors 'none'; object-src 'none';" always;
     
        
        proxy_set_header X-Forwarded-For $proxy_protocol_addr; # To forward the original client's IP address
        proxy_set_header X-Forwarded-Proto $scheme; # to forward the  original protocol (HTTP or HTTPS)
        proxy_set_header Host $host; # to forward the original host requested by the client

       absolute_redirect off;

        location / {
            proxy_pass http://frontend.openelis.org;
            proxy_redirect     off;
        }

        location /api/ {
            proxy_pass         https://oe.openelis.org:8443/api/;
            proxy_redirect     off;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Host $server_name;
        }
    }
}
