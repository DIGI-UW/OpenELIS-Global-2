worker_processes 1;

events { worker_connections 1024; }

http {
    server {
        listen 80;
        server_name _;
        
        absolute_redirect off;

        # Redirect root to /openelis/
        location = / {
            return 301 /openelis/;
        }

        # Redirect /openelis to /openelis/ for consistency
        location = /openelis {
            return 301 /openelis/;
        }
        
        # All other HTTP requests redirect to HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    server {
        listen 443 ssl;
        server_name _;

        ssl_certificate /etc/nginx/certs/apache-selfsigned.crt;
        ssl_certificate_key /etc/nginx/keys/apache-selfsigned.key;
        
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers off;

        absolute_redirect off;

        resolver 127.0.0.11 valid=30s;

        # Frontend - Static build served by nginx
        location /openelis/ {
            set $frontend_upstream http://frontend.openelis.org:80;
            rewrite ^/openelis/(.*) /$1 break;
            proxy_pass $frontend_upstream;
            proxy_redirect off;
            
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $server_name;
            
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }
        
        # Backend API (frontend uses serverBaseUrl=/api/OpenELIS-Global)
        location /api/OpenELIS-Global/ {
            set $oe_upstream http://oe.openelis.org:8080;
            rewrite ^/api/OpenELIS-Global/(.*)$ /OpenELIS-Global/$1 break;
            proxy_pass $oe_upstream;

            proxy_redirect     https://localhost:8443/OpenELIS-Global/LoginPage /openelis/login;
            proxy_redirect     https://127.0.0.1:8443/OpenELIS-Global/LoginPage /openelis/login;
            proxy_redirect     /OpenELIS-Global/LoginPage /openelis/login;
            proxy_redirect     /OpenELIS-Global/ /openelis/;
            proxy_redirect     /OpenELIS-Global/session /api/OpenELIS-Global/session;
            proxy_redirect     https://localhost/OpenELIS-Global/session /api/OpenELIS-Global/session;
            proxy_redirect     https://127.0.0.1/OpenELIS-Global/session /api/OpenELIS-Global/session;
            proxy_redirect     https://127.0.0.1:8443/OpenELIS-Global/session /api/OpenELIS-Global/session;

            proxy_cookie_path  /OpenELIS-Global /api/OpenELIS-Global;
            proxy_cookie_path  / /api/OpenELIS-Global;

            proxy_ssl_verify off;
            proxy_ssl_server_name on;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $server_name;

            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
            proxy_buffer_size 128k;
            proxy_buffers 4 256k;
            proxy_busy_buffers_size 256k;
        }

        # Backend API (alternate path /openelis/api/)
        location /openelis/api/ {
            set $oe_upstream http://oe.openelis.org:8080;
            rewrite ^/openelis/api/(.*) /$1 break;
            proxy_pass $oe_upstream;
            
            # Map legacy backend redirects to React frontend routes
            proxy_redirect     https://localhost:8443/OpenELIS-Global/LoginPage /openelis/login;
            proxy_redirect     https://127.0.0.1:8443/OpenELIS-Global/LoginPage /openelis/login;
            proxy_redirect     /OpenELIS-Global/LoginPage /openelis/login;
            proxy_redirect     /OpenELIS-Global/ /openelis/;
            
            # Redirect session API to its correct proxied path
            proxy_redirect     /OpenELIS-Global/session /openelis/api/OpenELIS-Global/session;
            proxy_redirect     https://localhost/OpenELIS-Global/session /openelis/api/OpenELIS-Global/session;
            proxy_redirect     https://127.0.0.1/OpenELIS-Global/session /openelis/api/OpenELIS-Global/session;
            proxy_redirect     https://127.0.0.1:8443/OpenELIS-Global/session /openelis/api/OpenELIS-Global/session;
            
            # Fix cookie paths
            proxy_cookie_path  /OpenELIS-Global /openelis;
            proxy_cookie_path  / /openelis;

            proxy_ssl_verify off;
            proxy_ssl_server_name on;
            
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $server_name;
            
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
            proxy_buffer_size 128k;
            proxy_buffers 4 256k;
            proxy_busy_buffers_size 256k;
        }

        # Legacy Redirect Support
        location /OpenELIS-Global/ {
            set $oe_legacy_upstream http://oe.openelis.org:8080;
            proxy_pass $oe_legacy_upstream; # URI is preserved
            proxy_redirect off;
            
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }
        
        # Backend REST (SSL)
        location /openelis/rest/ {
            set $oe_rest_upstream https://oe.openelis.org:8443;
            rewrite ^/openelis/rest/(.*) /OpenELIS-Global/rest/$1 break;
            proxy_pass $oe_rest_upstream;
            proxy_redirect off;
            proxy_ssl_verify off;
            proxy_ssl_server_name on;
            
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }
    }
}