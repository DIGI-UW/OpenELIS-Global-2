worker_processes 1;

events { worker_connections 1024; }
http {
    server {
        listen 80;
        server_name storage.openelis-global.org;
        
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }
        
        location / {
            return 301 https://$host$request_uri;
        }
    }

    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    # HTTPS server for storage.openelis-global.org
    # Uses Let's Encrypt certs if available, falls back to self-signed certs
    server {
        listen 443 ssl;
        server_name storage.openelis-global.org;

        # Try Let's Encrypt certificates first, fallback to self-signed if not available
        # Use self-signed certs for development/CI environments
        ssl_certificate /etc/nginx/certs/apache-selfsigned.crt;
        ssl_certificate_key /etc/nginx/keys/apache-selfsigned.key;
        
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers off;

        proxy_set_header X-Forwarded-For $proxy_protocol_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Host $host;
        absolute_redirect off;

        location / {
            proxy_pass https://frontend.openelis.org:3000;
            proxy_redirect off;
            proxy_ssl_verify off;
            proxy_ssl_server_name on;
        }

        location /api/ {
            proxy_pass http://oe.openelis.org:8080/api/;
            proxy_redirect off;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Host $server_name;
        }

        location /rest/ {
            proxy_pass http://oe.openelis.org:8080/rest/;
            proxy_redirect off;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Host $server_name;
        }
    }

    # Default HTTPS server (for other domains, uses self-signed)
    server {
        listen [::]:443 ssl;
        listen 443 ssl default;
        server_name __;

        ssl_certificate /etc/nginx/certs/apache-selfsigned.crt;
        ssl_certificate_key /etc/nginx/keys/apache-selfsigned.key;

        proxy_set_header X-Forwarded-For $proxy_protocol_addr; # To forward the original client's IP address
        proxy_set_header X-Forwarded-Proto $scheme; # to forward the  original protocol (HTTP or HTTPS)
        proxy_set_header Host $host; # to forward the original host requested by the client

       absolute_redirect off;

        location = /openelis {
            return 301 /openelis/;
        }

        location /openelis/ {
            proxy_pass https://frontend.openelis.org:3000;
            proxy_redirect     off;
            proxy_ssl_verify off;
            proxy_ssl_server_name on;
        }

        location /openelis/api/OpenELIS-Global/ {
            proxy_pass         http://oe.openelis.org:8080/OpenELIS-Global/;
            
            # Map all backend redirects to React frontend routes
            proxy_redirect     https://localhost:8443/OpenELIS-Global/LoginPage /openelis/login;
            proxy_redirect     https://127.0.0.1:8443/OpenELIS-Global/LoginPage /openelis/login;
            proxy_redirect     http://localhost:8080/OpenELIS-Global/LoginPage /openelis/login;
            proxy_redirect     http://127.0.0.1:8080/OpenELIS-Global/LoginPage /openelis/login;
            proxy_redirect     /OpenELIS-Global/LoginPage /openelis/login;

            # General Base Path Redirects
            proxy_redirect     https://localhost:8443/OpenELIS-Global/ /openelis/;
            proxy_redirect     https://127.0.0.1:8443/OpenELIS-Global/ /openelis/;
            proxy_redirect     http://localhost:8080/OpenELIS-Global/ /openelis/;
            proxy_redirect     http://127.0.0.1:8080/OpenELIS-Global/ /openelis/;
            proxy_redirect     /OpenELIS-Global/ /openelis/;
            
            # API Specific Redirects (Session)
            proxy_redirect     /OpenELIS-Global/session /openelis/api/OpenELIS-Global/session;
            proxy_redirect     https://localhost:8443/OpenELIS-Global/session /openelis/api/OpenELIS-Global/session;
            proxy_redirect     https://127.0.0.1:8443/OpenELIS-Global/session /openelis/api/OpenELIS-Global/session;
            proxy_redirect     http://localhost:8080/OpenELIS-Global/session /openelis/api/OpenELIS-Global/session;
            proxy_redirect     http://127.0.0.1:8080/OpenELIS-Global/session /openelis/api/OpenELIS-Global/session;

            proxy_cookie_path  /OpenELIS-Global /openelis;
            proxy_cookie_path  / /openelis;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Host $server_name;
        }

        location /openelis/api/ {
            proxy_pass         http://oe.openelis.org:8080/api/;
            proxy_redirect     https://localhost:8443/OpenELIS-Global/LoginPage /openelis/login;
            proxy_redirect     https://localhost/OpenELIS-Global/LoginPage /openelis/login;
            proxy_redirect     /OpenELIS-Global/LoginPage /openelis/login;
            proxy_redirect     /OpenELIS-Global/ /openelis/;
            proxy_redirect     https://localhost:8443/api/ /openelis/api/;
            proxy_cookie_path  /api/OpenELIS-Global /openelis/api/OpenELIS-Global;
            proxy_cookie_path  /OpenELIS-Global /openelis;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Host $server_name;
        }

        location /openelis/rest/ {
            proxy_pass         http://oe.openelis.org:8080/OpenELIS-Global/rest/;
            proxy_redirect     https://localhost:8443/OpenELIS-Global/LoginPage /openelis/login;
            proxy_redirect     https://localhost/OpenELIS-Global/LoginPage /openelis/login;
            proxy_redirect     /OpenELIS-Global/LoginPage /openelis/login;
            proxy_redirect     /OpenELIS-Global/ /openelis/;
            proxy_cookie_path  /OpenELIS-Global /openelis;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Host $server_name;
        }

        location / {
            #Redirecting to the Front end on host machine 
            proxy_pass https://frontend.openelis.org:3000;
            proxy_redirect     off;
            proxy_ssl_verify off;
            proxy_ssl_server_name on;
        }

        location /api/ {
            #Redirecting to OpenELIS server on host machine
            proxy_pass         http://oe.openelis.org:8080/api/;
            proxy_redirect     off;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Host $server_name;
        }

        location /rest/ {
            proxy_pass         http://oe.openelis.org:8080/rest/;
            proxy_redirect     off;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Host $server_name;
        }
        
        # Legacy Redirect Support
        location /OpenELIS-Global/ {
            proxy_pass http://oe.openelis.org:8080/OpenELIS-Global/;
            proxy_redirect off;
            
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }
    }
}
