server {
    listen 3000;
    server_name _;

    # Standardizes on :3000 to match Vite dev-server's native port. The outer
    # harness proxy (or real prod edge proxy) then speaks one port regardless
    # of whether it's routed to the dev-server image (Dockerfile `target: dev`)
    # or the baked-dist nginx image (Dockerfile `target: runtime`).
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html =404;
    }
}
