name: Playwright E2E Tests

on:
  pull_request:
    branches: [develop]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  playwright-tests:
    name: Playwright shard ${{ matrix.shard }}/3
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps
        working-directory: frontend

      # Use .env.example as single source of truth: copy to .env so Docker Compose
      # loads it for ${VAR} substitution (OE_DB_PASSWORD, SSL_*, etc.).
      - name: Prepare .env from template
        run: cp .env.example .env

      - name: Free disk space before Docker build
        run: |
          echo "=== Disk usage before cleanup ==="
          df -h
          echo "=== Cleaning Docker cache ==="
          docker system prune -af --volumes || true
          docker builder prune -af || true
          echo "=== Disk usage after cleanup ==="
          df -h

      - name: Build OpenELIS containers
        run: docker compose -f build.docker-compose.yml up -d --build --wait --wait-timeout 600

      - name: Wait for application to be ready
        run: |
          echo "Waiting for application to respond..."
          timeout 60 bash -c 'until curl -k -s -f https://localhost/ > /dev/null; do sleep 2; done' || exit 1
          echo "Application is ready"

      - name: Run Playwright tests
        id: run_playwright
        run: npm run pw:test -- --shard=${{ matrix.shard }}/3
        working-directory: frontend
        env:
          CI: true
          BASE_URL: https://localhost
          TEST_USER: ${{ vars.TEST_USER || 'admin' }}
          TEST_PASS: ${{ secrets.TEST_PASS || 'adminADMIN!' }}

      - name: Export normalized Playwright results
        if: always()
        run: |
          mkdir -p frontend/test-results
          mkdir -p frontend/playwright-report

          SOURCE_JSON=""
          if [ -f frontend/playwright-report/results.json ]; then
            SOURCE_JSON="frontend/playwright-report/results.json"
          elif [ -d frontend/blob-report ] && [ -n "$(ls -A frontend/blob-report 2>/dev/null)" ]; then
            echo "Direct Playwright JSON report missing, deriving JSON from blob report."
            (cd frontend && npx playwright merge-reports --reporter json ./blob-report > playwright-report/merged-results.json)
            if [ -s frontend/playwright-report/merged-results.json ]; then
              SOURCE_JSON="frontend/playwright-report/merged-results.json"
            fi
          fi

          if [ -n "${SOURCE_JSON}" ]; then
            node scripts/e2e/export-playwright-results.js \
              --input "${SOURCE_JSON}" \
              --output frontend/test-results/playwright-normalized-${{ matrix.shard }}.json \
              --shard ${{ matrix.shard }}
          else
            echo "Playwright JSON results were not produced; writing fallback normalized record."
            node -e "const fs=require('fs');const p='frontend/test-results/playwright-normalized-${{ matrix.shard }}.json';fs.writeFileSync(p, JSON.stringify({generatedAt:new Date().toISOString(),generatedBy:'playwright-e2e.yml:fallback',framework:'playwright',shard:'${{ matrix.shard }}',summary:{total:0,passed:0,failed:0,skipped:0,flaky:0,unknown:1,durationMs:0},tests:[]},null,2)+'\\n');"
          fi

      - name: Upload normalized Playwright results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-normalized-${{ matrix.shard }}
          path: frontend/test-results/playwright-normalized-${{ matrix.shard }}.json
          if-no-files-found: error
          retention-days: 7

      - name: Upload Playwright JSON report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-json-${{ matrix.shard }}
          path: |
            frontend/playwright-report/results.json
            frontend/playwright-report/merged-results.json
          if-no-files-found: ignore
          retention-days: 7

      - name: Upload Playwright blob report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-blob-report-${{ matrix.shard }}
          path: frontend/blob-report/
          if-no-files-found: ignore
          retention-days: 7

      - name: Upload Playwright HTML report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-shard-${{ matrix.shard }}
          path: frontend/playwright-report/
          retention-days: 7

      - name: Upload failure screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-screenshots-shard-${{ matrix.shard }}
          path: frontend/test-results/**/test-failed-*.png
          retention-days: 7
          if-no-files-found: ignore

      - name: Upload test traces
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces-shard-${{ matrix.shard }}
          path: frontend/test-results/**/trace.zip
          retention-days: 7
          if-no-files-found: ignore

      - name: Dump docker logs on failure
        if: failure()
        uses: jwalton/gh-docker-logs@v2
        with:
          tail: '100'

  # Fan-in job keeps a single stable check name for branch protection while
  # still allowing shard-level parallelism.
  playwright-e2e:
    if: always()
    needs: [playwright-tests]
    runs-on: ubuntu-latest
    name: Run Playwright E2E Tests
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Download blob reports from shards
        if: always()
        uses: actions/download-artifact@v4
        with:
          pattern: playwright-blob-report-*
          merge-multiple: true
          path: frontend/blob-report

      - name: Merge shard blob reports into HTML
        if: always()
        run: |
          if [ -d frontend/blob-report ] && [ -n "$(ls -A frontend/blob-report 2>/dev/null)" ]; then
            cd frontend
            npx playwright merge-reports --reporter html ./blob-report
          else
            echo "No blob reports found to merge."
          fi

      - name: Upload merged Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-merged-report
          path: frontend/playwright-report/
          if-no-files-found: ignore
          retention-days: 7

      - name: Check shard results
        run: |
          if [[ "${{ needs.playwright-tests.result }}" != "success" ]]; then
            echo "One or more Playwright shards failed."
            exit 1
          fi
          echo "All Playwright shards passed."

