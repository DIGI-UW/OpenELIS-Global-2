# README badge mirror: polls commit status `04 Checkpoint - Publish` for the
# pushed `develop` SHA. `publish-images.yml` is `workflow_run`-triggered.
name: Badge / 04 Checkpoint Publish (develop)

on:
  push:
    branches: [develop]

permissions:
  contents: read
  statuses: read

jobs:
  mirror:
    name: Mirror 04 Checkpoint - Publish
    if: github.repository == 'DIGI-UW/OpenELIS-Global-2'
    runs-on: ubuntu-latest
    steps:
      - name: Wait for publish checkpoint on this commit
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const sha = context.sha;
            const contextName = '04 Checkpoint - Publish';
            const timeoutMs = 60 * 60 * 1000;
            const pollMs = 30 * 1000;
            const started = Date.now();

            while (Date.now() - started < timeoutMs) {
              const res = await github.rest.repos.listCommitStatusesForRef({
                owner,
                repo,
                ref: sha,
                per_page: 100,
              });
              const status = res.data.find((entry) => entry.context === contextName);

              if (!status) {
                core.info(`No '${contextName}' status yet for ${sha}; waiting...`);
              } else if (status.state === 'success') {
                core.info(`Found successful '${contextName}' status.`);
                return;
              } else if (status.state === 'failure' || status.state === 'error') {
                core.setFailed(`Checkpoint status is ${status.state}: ${status.description || 'no description'}`);
                return;
              } else {
                core.info(`Checkpoint currently '${status.state}'; waiting...`);
              }

              await new Promise((resolve) => setTimeout(resolve, pollMs));
            }

            core.setFailed(`Timed out waiting for '${contextName}' on ${sha}`);
