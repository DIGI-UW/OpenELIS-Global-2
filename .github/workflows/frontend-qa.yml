name: OpenELIS Frontend QA framework workflow

on:
  pull_request:
  workflow_dispatch:
  workflow_call:

env:
  DOCKER_NAME: ${{ vars.DOCKERHUB_USERNAME }}/${{ github.event.repository.name }}-frontend

jobs:
  # ---------- Job 1: Build production Docker image (verify Dockerfile.prod) ----------
  build-prod-frontend-image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v2

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_NAME }}

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile.prod
          push: false

  # ---------- Job 2: Static checks (no Docker needed — fast) ----------
  static-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout OpenELIS-Global2
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Check Format
        run: npx prettier ./ --check
        working-directory: frontend

      - name: Run Frontend Unit Tests (Jest)
        run: npm test -- --watchAll=false --coverage=false
        working-directory: frontend
        env:
          CI: true

  # ---------- Job 3: Playwright E2E tests (parallel with Cypress) ----------
  e2e-playwright:
    needs: static-checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout OpenELIS-Global2
        uses: actions/checkout@v4
        with:
          repository: ${{github.repository}}
          submodules: recursive

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps
        working-directory: frontend

      - name: Prepare .env from template
        run: cp .env.example .env

      - name: Build OpenELIS Images and Run containers
        run: docker compose -f build.docker-compose.yml up -d --build --wait --wait-timeout 600

      - name: Load test fixtures into database
        run: |
          docker compose -f build.docker-compose.yml exec -T db.openelis.org psql -U clinlims -d clinlims --set=ON_ERROR_STOP=on < src/test/resources/e2e-foundational-data.sql
          docker compose -f build.docker-compose.yml exec -T db.openelis.org psql -U clinlims -d clinlims --set=ON_ERROR_STOP=on < src/test/resources/analyzer-test-data.sql

      - name: Run Playwright E2E Tests
        run: npm run pw:test
        working-directory: frontend
        env:
          CI: true
          # Use vars/secrets when configured; defaults allow workflow to run out of the box
          TEST_USER: ${{ vars.TEST_USER || 'admin' }}
          TEST_PASS: ${{ secrets.TEST_PASS || 'adminADMIN!' }}

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 30

      - name: Dump docker logs on failure
        if: failure()
        uses: jwalton/gh-docker-logs@v2
        with:
          tail: "100"

  # ---------- Job 4: Cypress E2E tests (parallel with Playwright) ----------
  e2e-cypress:
    needs: static-checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout OpenELIS-Global2
        uses: actions/checkout@v4
        with:
          repository: ${{github.repository}}
          submodules: recursive

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Install Google Chrome
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      # Use .env.example as single source of truth: copy to .env so Docker Compose
      # loads it for ${VAR} substitution (OE_DB_PASSWORD, SSL_*, etc.).
      - name: Prepare .env from template
        run: cp .env.example .env

      - name: Build OpenELIS Images and Run containers
        run: docker compose -f build.docker-compose.yml up -d --build --wait --wait-timeout 600

      - name: Load test fixtures into database
        run: |
          docker compose -f build.docker-compose.yml exec -T db.openelis.org psql -U clinlims -d clinlims --set=ON_ERROR_STOP=on < src/test/resources/e2e-foundational-data.sql
          docker compose -f build.docker-compose.yml exec -T db.openelis.org psql -U clinlims -d clinlims --set=ON_ERROR_STOP=on < src/test/resources/analyzer-test-data.sql

      - name: Run Cypress E2E Tests (Headless Chrome)
        run: npx cypress run --browser chrome --headless
        working-directory: frontend
        env:
          E2E_FAIL_FAST: "true"
          CYPRESS_FAIL_FAST_ENABLED: "true"
          CYPRESS_BASE_URL: https://localhost
          LC_ALL: en_US.UTF-8
          LANG: en_US.UTF-8
          TEST_USER: ${{ vars.TEST_USER || 'admin' }}
          TEST_PASS: ${{ secrets.TEST_PASS || 'adminADMIN!' }}

      - name: Upload Cypress screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-screenshots
          path: frontend/cypress/screenshots/**/*.png
          if-no-files-found: ignore

      - name: Dump docker logs on failure
        if: failure()
        uses: jwalton/gh-docker-logs@v2
        with:
          tail: "100"

  # ---------- Summary job: satisfies branch-protection required check ----------
  build-and-run-qa-tests:
    if: always()
    needs: [static-checks, build-prod-frontend-image, e2e-playwright, e2e-cypress]
    runs-on: ubuntu-latest
    steps:
      - name: Check sub-job results
        run: |
          if [[ "${{ needs.static-checks.result }}" != "success" ]] ||
             [[ "${{ needs.build-prod-frontend-image.result }}" != "success" ]] ||
             [[ "${{ needs.e2e-playwright.result }}" != "success" ]] ||
             [[ "${{ needs.e2e-cypress.result }}" != "success" ]]; then
            echo "One or more sub-jobs failed:"
            echo "  static-checks: ${{ needs.static-checks.result }}"
            echo "  build-prod-frontend-image: ${{ needs.build-prod-frontend-image.result }}"
            echo "  e2e-playwright: ${{ needs.e2e-playwright.result }}"
            echo "  e2e-cypress: ${{ needs.e2e-cypress.result }}"
            exit 1
          fi
          echo "All sub-jobs passed."
