name: Analyzer E2E (Harness)

on:
  pull_request:
    branches: [develop]
  workflow_dispatch:

jobs:
  analyzer-e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps
        working-directory: frontend

      - name: Prepare .env
        run: cp .env.example .env

      - name: Free disk space before builds
        run: |
          echo "=== Disk usage before cleanup ==="
          df -h
          docker system prune -af --volumes || true
          docker builder prune -af || true
          echo "=== Disk usage after cleanup ==="
          df -h

      - name: Build OpenELIS artifacts for plugin compilation
        run: mvn clean install -DskipTests -Dmaven.test.skip=true -Dspotless.check.skip=true

      - name: Build plugins
        run: mvn clean install -DskipTests -Dmaven.test.skip=true
        working-directory: plugins

      - name: Stage plugin jars for runtime loading
        run: |
          rm -rf volume/plugins/*
          find plugins/analyzers -type f -path "*/target/*.jar" \
            ! -name "*sources.jar" ! -name "*javadoc.jar" \
            -exec cp {} volume/plugins/ \;
          ls -lah volume/plugins

      - name: Build and start analyzer harness stack
        run: docker compose -f build.docker-compose.yml -f .github/ci/ci.analyzer-harness.yml up -d --build --wait --wait-timeout 900

      - name: Wait for OpenELIS, bridge, and simulator readiness
        run: |
          timeout 120 bash -c 'until curl -k -s -f https://localhost/ > /dev/null; do sleep 2; done'
          timeout 120 bash -c 'until curl -k -s -f https://localhost:8442/actuator/health > /dev/null; do sleep 2; done'
          timeout 120 bash -c 'until curl -s -f http://localhost:8085/health > /dev/null; do sleep 2; done'

      - name: Load analyzer harness fixture dataset
        run: docker exec -i openelisglobal-database psql -U clinlims -d clinlims < src/test/resources/analyzer-harness-e2e.sql

      - name: Run analyzer Playwright tests
        run: npm run pw:test -- --project=analyzer
        working-directory: frontend
        env:
          CI: true
          ANALYZER_HARNESS: "true"
          BASE_URL: https://localhost
          TEST_USER: ${{ vars.TEST_USER || 'admin' }}
          TEST_PASS: ${{ secrets.TEST_PASS }}

      - name: Upload Playwright HTML report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: analyzer-playwright-report
          path: frontend/playwright-report/
          retention-days: 7

      - name: Upload failure screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: analyzer-playwright-screenshots
          path: frontend/test-results/**/test-failed-*.png
          retention-days: 7
          if-no-files-found: ignore

      - name: Upload test traces
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: analyzer-playwright-traces
          path: frontend/test-results/**/trace.zip
          retention-days: 7
          if-no-files-found: ignore

      - name: Dump docker logs on failure
        if: failure()
        uses: jwalton/gh-docker-logs@v2
        with:
          tail: "200"
