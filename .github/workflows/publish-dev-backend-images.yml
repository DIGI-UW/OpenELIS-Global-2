name: Publishing / Dev Images / Backend

on:
  push:
    branches: [develop, demo-silnas]
  workflow_dispatch:

env:
  REGISTRY: docker.io
  IMAGE_NAME: ${{ github.repository }}
  DOCKER_NAME: ${{ vars.DOCKERHUB_USERNAME }}/openelis-global-2

jobs:
  build-and-push-image-backend-dev:
    if: ${{ github.repository == 'DIGI-UW/OpenELIS-Global-2' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        platform:
          - amd64
          - arm64
    permissions:
      contents: read
      packages: write
    outputs:
      image_name: ${{ steps.prep.outputs.image_name }}
    steps:
      - name: Prepare
        id: prep
        run: |
          platform=linux/${{ matrix.platform }}
          echo "PLATFORM_PAIR_BACKEND=${platform//\//-}" >> $GITHUB_ENV
          branch="${{ github.ref_name }}"
          if [ "$branch" = "develop" ]; then
            image_name="${{ env.DOCKER_NAME }}-dev"
          else
            slug="${branch//\//-}"
            image_name="${{ env.DOCKER_NAME }}-dev-${slug}"
          fi
          echo "BRANCH_IMAGE_NAME=${image_name}" >> $GITHUB_ENV
          echo "image_name=${image_name}" >> $GITHUB_OUTPUT
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          submodules: recursive
        # Add support for more platforms with QEMU (optional)
        # https://github.com/docker/setup-qemu-action
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Login to DockerHub
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.BRANCH_IMAGE_NAME }}
      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.dev
          # push: true
          platforms: linux/${{ matrix.platform }}
          # tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          #cache-from: type=registry,ref=${{ env.BRANCH_IMAGE_NAME }}:${{ matrix.platform }}-buildcache-dev
          cache-to: type=registry,ref=${{ env.BRANCH_IMAGE_NAME }}:${{ matrix.platform }}-buildcache-dev,mode=max
          build-args: SKIP_SPOTLESS=true
          outputs: type=image,name=${{ env.BRANCH_IMAGE_NAME }},push-by-digest=true,name-canonical=true,push=true
      - name: Export digest
        run: |
          mkdir -p /tmp/digests/backend
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/backend/${digest#sha256:}"
      - name: Upload digest
        uses: actions/upload-artifact@v6
        with:
          name: digests-${{ env.PLATFORM_PAIR_BACKEND }}-backend
          path: /tmp/digests/backend/*
          if-no-files-found: error
          retention-days: 1

  merge-backend-dev-platform-images:
    if: ${{ github.repository == 'DIGI-UW/OpenELIS-Global-2' }}
    runs-on: ubuntu-latest
    needs:
      - build-and-push-image-backend-dev
    steps:
      - name: Download digests
        uses: actions/download-artifact@v6
        with:
          path: /tmp/digests/backend
          pattern: digests-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ needs.build-and-push-image-backend-dev.outputs.image_name }}

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Create manifest list and push
        working-directory: /tmp/digests/backend
        run: |
          docker buildx imagetools create $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf '${{ needs.build-and-push-image-backend-dev.outputs.image_name }}@sha256:%s ' *)

      - name: Inspect image
        run: |
          docker buildx imagetools inspect ${{ needs.build-and-push-image-backend-dev.outputs.image_name }}:${{ steps.meta.outputs.version }}
