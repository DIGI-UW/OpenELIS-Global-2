# separate terms of service, privacy policy, and support
# documentation.

name: Publish demo Docker Images - Frontend

on:
  push:
    branches: 
      - 'demo/**'
  workflow_dispatch:

env:
  REGISTRY: docker.io
  IMAGE_NAME: ${{ github.repository }}
  DOCKER_NAME: ${{ vars.DOCKERHUB_USERNAME }}/openelis-global-2
  BRANCH_NAME: ${{ github.head_ref || github.ref_name }} 

jobs:
  build-and-push-image-frontend-demo:
    if: ${{ github.repository == 'DIGI-UW/OpenELIS-Global-2' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        platform:
          - amd64
          - arm64
    permissions:
      contents: read
      packages: write
    steps:
      - name: Prepare
        run: |
          platform=linux/${{ matrix.platform }}
          echo "PLATFORM_PAIR_FRONTEND=${platform//\//-}" >> $GITHUB_ENV

      - name: Checkout repository
        uses: actions/checkout@v4

        # Add support for more platforms with QEMU (optional)
        # https://github.com/docker/setup-qemu-action
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env. }}-frontend-${{ env.BRANCH_NAME }}

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          # push: true
          platforms: linux/${{ matrix.platform }}
          # tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env. }}-frontend-${{ env.BRANCH_NAME }}:${{ matrix.platform }}-buildcache-${{ env.BRANCH_NAME }}
          cache-to: type=registry,ref=${{ env.DOCKER_NAME }}-frontend-${{ env.BRANCH_NAME }}:${{ matrix.platform }}-buildcache-${{ env.BRANCH_NAME }},mode=max
          outputs: type=image,name=${{ env.DOCKER_NAME }}-frontend-${{ env.BRANCH_NAME }},push-by-digest=true,name-canonical=true,push=true
      - name: Export digest
        run: |
          mkdir -p /tmp/digests/frontend
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/frontend/${digest#sha256:}"
      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ env.PLATFORM_PAIR_FRONTEND }}-frontend
          path: /tmp/digests/frontend/*
          if-no-files-found: error
          retention-days: 1

  merge-frontend-demo-platform-images:
    if: ${{ github.repository == 'DIGI-UW/OpenELIS-Global-2' }}
    runs-on: ubuntu-latest
    needs:
      - build-and-push-image-frontend-demo
    steps:
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests/frontend
          pattern: digests-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_NAME }}-frontend-demo

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Create manifest list and push
        working-directory: /tmp/digests/frontend
        run: |
          docker buildx imagetools create $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf '${{ env.DOCKER_NAME }}-frontend-${{ env.BRANCH_NAME }}@sha256:%s ' *)

      - name: Inspect image
        run: |
          docker buildx imagetools inspect ${{ env.DOCKER_NAME }}-frontend-${{ env.BRANCH_NAME }}:${{ steps.meta.outputs.version }}
