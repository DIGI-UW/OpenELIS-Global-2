name: 04 - Cypress

on:
  pull_request:
  workflow_dispatch:
  workflow_call:

permissions:
  contents: read
  packages: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build-once:
    name: Build Once
    runs-on: ubuntu-latest
    steps:
      - name: Checkout OpenELIS-Global2
        uses: actions/checkout@v4
        with:
          repository: ${{github.repository}}
          submodules: recursive

      - name: Prepare .env from template
        run: cp .env.example .env

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare compose images (reuse analyzer cache first)
        id: prepare-images
        run: |
          TAG="pr-${{ github.event.pull_request.number || github.sha }}"
          OWNER_LOWER="$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')"
          docker compose -f build.docker-compose.yml config --images | sort -u > /tmp/cypress-images.txt
          : > /tmp/cypress-image-map.txt
          MISSING=0

          # Prefer pulling analyzer-built images to avoid duplicate builds.
          for attempt in {1..20}; do
            MISSING=0
            : > /tmp/cypress-image-map.txt
            while IFS= read -r image; do
              [ -z "$image" ] && continue
              image_repo="$(echo "$image" | tr '[:upper:]' '[:lower:]' | sed 's|[^a-z0-9._/-]|-|g')"
              ghcr_image="ghcr.io/${OWNER_LOWER}/openelis-global-2/analyzer-cache/${image_repo}:${TAG}"
              if docker pull "$ghcr_image" >/dev/null 2>&1; then
                docker tag "$ghcr_image" "$image"
                printf "%s|%s\n" "$image" "$ghcr_image" >> /tmp/cypress-image-map.txt
              else
                MISSING=1
                break
              fi
            done < /tmp/cypress-images.txt

            if [ "$MISSING" -eq 0 ]; then
              echo "Using analyzer-built images from GHCR."
              break
            fi

            echo "Analyzer images not ready yet (attempt ${attempt}/20); waiting 30s..."
            sleep 30
          done

          if [ "$MISSING" -eq 0 ] && [ -s /tmp/cypress-image-map.txt ]; then
            echo "Image mappings from analyzer cache:"
            cat /tmp/cypress-image-map.txt
            echo "needs_build=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Analyzer images unavailable after retries; falling back to one-time Cypress build."
          echo "needs_build=true" >> "$GITHUB_OUTPUT"
        shell: bash

      - name: Build OpenELIS images (cached fallback)
        if: ${{ steps.prepare-images.outputs.needs_build == 'true' }}
        uses: docker/bake-action@v5
        with:
          files: build.docker-compose.yml
          load: true
          set: |
            *.cache-from=type=gha,scope=cypress-e2e
            *.cache-to=type=gha,scope=cypress-e2e,mode=max

      - name: Tag and push fallback images to GHCR
        if: ${{ steps.prepare-images.outputs.needs_build == 'true' }}
        run: |
          TAG="pr-${{ github.event.pull_request.number || github.sha }}"
          OWNER_LOWER="$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')"
          : > /tmp/cypress-image-map.txt
          while IFS= read -r image; do
            [ -z "$image" ] && continue
            if docker image inspect "$image" >/dev/null 2>&1; then
              image_repo="$(echo "$image" | tr '[:upper:]' '[:lower:]' | sed 's|[^a-z0-9._/-]|-|g')"
              ghcr_image="ghcr.io/${OWNER_LOWER}/openelis-global-2/cypress-cache/${image_repo}:${TAG}"
              docker tag "$image" "$ghcr_image"
              docker push "$ghcr_image"
              printf "%s|%s\n" "$image" "$ghcr_image" >> /tmp/cypress-image-map.txt
            else
              echo "WARN: skipping $image (not built locally)"
            fi
          done < /tmp/cypress-images.txt
          if [ ! -s /tmp/cypress-image-map.txt ]; then
            echo "No locally available images were pushed to GHCR."
            exit 1
          fi
          echo "Pushed image mappings:"
          cat /tmp/cypress-image-map.txt

      - name: Upload Docker image map artifact
        uses: actions/upload-artifact@v4
        with:
          name: cypress-image-map
          path: /tmp/cypress-image-map.txt
          if-no-files-found: error
          retention-days: 1

  e2e-cypress:
    name: ${{ matrix.shard_name }}
    needs: [build-once]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - shard: core
            shard_name: Core
            specs: >-
              cypress/e2e/login.cy.js,
              cypress/e2e/home.cy.js,
              cypress/e2e/AdminE2E/organizationManagement.cy.js,
              cypress/e2e/AdminE2E/providerManagement.cy.js,
              cypress/e2e/patientEntry.cy.js,
              cypress/e2e/orderEntity.cy.js,
              cypress/e2e/modifyOrder.cy.js,
              cypress/e2e/batchOrderEntry.cy.js,
              cypress/e2e/workplan.cy.js,
              cypress/e2e/result.cy.js,
              cypress/e2e/validation.cy.js,
              cypress/e2e/nonConform.cy.js,
              cypress/e2e/dashboard.cy.js,
              cypress/e2e/report.cy.js,
              cypress/e2e/AdminE2E/barcode.cy.js
          - shard: storage
            shard_name: Storage
            specs: >-
              cypress/e2e/storageAssignment.cy.js,
              cypress/e2e/storageBoxCRUD.cy.js,
              cypress/e2e/storageBoxCRUD-integration.cy.js,
              cypress/e2e/storageDashboard.cy.js,
              cypress/e2e/storageDashboardMetrics.cy.js,
              cypress/e2e/storageDisposal.cy.js,
              cypress/e2e/storageFilters.cy.js,
              cypress/e2e/storageLocationCRUD.cy.js,
              cypress/e2e/storageLocationCRUD-integration.cy.js,
              cypress/e2e/storageLocationCRUD-smoke.cy.js,
              cypress/e2e/storageLocationExpandableRows.cy.js,
              cypress/e2e/storageSamplesTable.cy.js,
              cypress/e2e/storageSearch.cy.js,
              cypress/e2e/storageViewStorage.cy.js
          - shard: admin
            shard_name: Admin
            specs: >-
              cypress/e2e/AdminE2E/userManagement.cy.js,
              cypress/e2e/siteBranding.cy.js,
              cypress/e2e/patientMerge.cy.js,
              cypress/e2e/help.cy.js,
              cypress/e2e/labNumberManagement.cy.js,
              cypress/e2e/AdminE2E/dictionaryMenu.cy.js,
              cypress/e2e/AdminE2E/calculatedValueTestsManagement.cy.js,
              cypress/e2e/AdminE2E/batchTestReassignmentandCancelation.cy.js
          # Catch-all: specs computed dynamically (see "Compute catch-all specs" step)
          - shard: independent
            shard_name: Independent
            specs: ""
    steps:
      - name: Checkout OpenELIS-Global2
        uses: actions/checkout@v4
        with:
          repository: ${{github.repository}}
          submodules: recursive

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Install Google Chrome
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      - name: Prepare .env from template
        run: cp .env.example .env

      - name: Download Docker image map artifact
        uses: actions/download-artifact@v4
        with:
          name: cypress-image-map
          path: /tmp/cypress-image-map

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull and retag prebuilt compose images
        run: |
          while IFS='|' read -r source_image ghcr_image; do
            [ -z "$source_image" ] && continue
            docker pull "$ghcr_image"
            docker tag "$ghcr_image" "$source_image"
          done < /tmp/cypress-image-map/cypress-image-map.txt

      - name: Start containers
        run: docker compose -f build.docker-compose.yml up -d --no-build --wait --wait-timeout 600

      - name: Load test fixtures into database
        run: |
          docker compose -f build.docker-compose.yml exec -T db.openelis.org psql -U clinlims -d clinlims --set=ON_ERROR_STOP=on < src/test/resources/e2e-foundational-data.sql

      - name: Compute catch-all specs for independent shard
        if: matrix.shard == 'independent'
        id: catchall
        working-directory: frontend
        run: |
          # Extract specs assigned to other shards from the workflow YAML.
          # Uses grep/sed instead of PyYAML to avoid non-stdlib dependency.
          ASSIGNED=$(grep -E '^\s+cypress/e2e/' ../.github/workflows/e2e-cypress-deprecated.yml \
            | sed 's/^[[:space:]]*//' | sed 's/,$//' | sort -u)
          # Find all spec files on disk
          ALL=$(find cypress/e2e -name '*.cy.js' -type f | sort)
          # Compute remaining = ALL - ASSIGNED
          REMAINING=""
          while IFS= read -r spec; do
            echo "$ASSIGNED" | grep -qxF "$spec" || REMAINING="${REMAINING:+$REMAINING,}$spec"
          done <<< "$ALL"
          echo "specs=$REMAINING" >> "$GITHUB_OUTPUT"
          # Log for debugging
          TOTAL=$(echo "$ALL" | wc -l)
          ASSIGNED_COUNT=$(echo "$ASSIGNED" | wc -l)
          REMAINING_COUNT=$(echo "$REMAINING" | tr ',' '\n' | wc -l)
          echo "Catch-all: $REMAINING_COUNT specs (of $TOTAL total, $ASSIGNED_COUNT assigned to other shards)"
          echo "$REMAINING" | tr ',' '\n' | sed 's/^/  /'

      - name: Run Cypress E2E Tests — ${{ matrix.shard }}
        run: |
          if [ "${{ matrix.shard }}" = "independent" ]; then
            SPECS="${{ steps.catchall.outputs.specs }}"
          else
            SPECS="${{ matrix.specs }}"
          fi
          echo "Running specs: $SPECS"
          npx cypress run --browser chrome --headless --spec "$SPECS"
        working-directory: frontend
        env:
          E2E_FAIL_FAST: "true"
          CYPRESS_FAIL_FAST_ENABLED: "true"
          CYPRESS_BASE_URL: https://localhost
          LC_ALL: en_US.UTF-8
          LANG: en_US.UTF-8
          TEST_USER: ${{ vars.TEST_USER || 'admin' }}
          TEST_PASS: ${{ secrets.TEST_PASS || 'adminADMIN!' }}

      - name: Upload Cypress screenshots (${{ matrix.shard }})
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-screenshots-${{ matrix.shard }}
          path: frontend/cypress/screenshots/**/*.png
          if-no-files-found: ignore

      # In case of failure, uncomment this action and turn video: false to true in cypress.config.js
      # - name: Upload Cypress videos on failure
      #   if: failure()
      #   uses: actions/upload-artifact@v4
      #   with:
      #     name: cypress-videos-${{ matrix.shard }}
      #     path: frontend/cypress/videos/**/*.mp4

      - name: Dump backend logs (${{ matrix.shard }})
        if: always()
        run: |
          echo "=== OpenELIS Backend Logs (last 500 lines) ==="
          docker compose -f build.docker-compose.yml logs --tail=500 oe.openelis.org 2>&1 || true
          echo ""
          echo "=== Database Logs (last 200 lines) ==="
          docker compose -f build.docker-compose.yml logs --tail=200 db.openelis.org 2>&1 || true

      - name: Dump docker logs on failure
        if: failure()
        uses: jwalton/gh-docker-logs@v2
        with:
        # Only show last 100 lines of each
          tail: "100"

  cypress-gate:
    name: 04 Checkpoint - Cypress
    if: always()
    needs: [build-once, e2e-cypress]
    runs-on: ubuntu-latest
    steps:
      - name: Check sub-job results
        run: |
          if [[ "${{ needs.build-once.result }}" != "success" ]]; then
            echo "Cypress build-once job failed: ${{ needs.build-once.result }}"
            exit 1
          fi
          if [[ "${{ needs.e2e-cypress.result }}" != "success" ]]; then
            echo "Cypress job failed: ${{ needs.e2e-cypress.result }}"
            exit 1
          fi
          echo "Cypress E2E sub-jobs passed."
