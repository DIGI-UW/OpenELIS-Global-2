name: Deploy spec canvases to GitHub Pages

# Publishes any spec directory that contains a canvas/ subdir to the
# gh-pages branch. For each spec/<feature>/ with a canvas/, the ENTIRE
# spec dir is staged (markdown spec files + canvas + contracts + checklists)
# so the canvas's Spec Files tab can fetch ../spec.md, ../plan.md etc. at
# runtime relative to its served location.
#
# clean: false preserves the existing Java coverage publish at the
# gh-pages root; the coverage workflow and this canvases workflow do not
# clobber each other. Renaming a feature directory leaves the old dir
# in gh-pages until manually cleaned — acceptable for v1.

on:
  push:
    branches: [main, develop]
    paths:
      - "specs/**"
      - ".specify/oe/skills/overview/templates/canvas.html.template"
      - ".github/workflows/canvases.yml"
  workflow_dispatch:

permissions:
  contents: write   # required for JamesIves/github-pages-deploy-action

concurrency:
  group: pages-canvases
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Stage spec dirs (with canvas) for deployment
        run: |
          set -euo pipefail
          mkdir -p canvases-stage
          # For every spec dir that has a canvas/ subdir, stage the whole
          # dir (markdown + canvas + contracts + checklists). The canvas's
          # Spec Files tab does fetch('../{name}.md') so the spec files
          # MUST live next to the canvas/ subdir on gh-pages too.
          spec_dirs=$(find specs -mindepth 2 -maxdepth 2 -type d -name canvas | while read -r d; do dirname "$d"; done | sort -u)
          if [ -z "$spec_dirs" ]; then
            echo "no spec dirs with canvas/ found; nothing to deploy"
            exit 0
          fi
          for d in $spec_dirs; do
            target="canvases-stage/$d"
            mkdir -p "$target"
            cp -R "$d"/. "$target"/
            echo "staged $d -> $target"
          done
          echo "staged tree (top files):"
          find canvases-stage -maxdepth 5 -type f | head -30
          echo "(total files: $(find canvases-stage -type f | wc -l))"

      - name: Index page listing all deployed canvases
        run: |
          set -euo pipefail
          mkdir -p canvases-stage/specs
          # Generate a tiny landing page so visitors to
          # /specs/ see what canvases are available.
          cat > canvases-stage/specs/index.html <<'HTML'
          <!doctype html><meta charset="utf-8">
          <title>OpenELIS Global — Spec Canvases</title>
          <style>
            body { font-family: ui-sans-serif, system-ui, sans-serif; max-width: 720px; margin: 4rem auto; padding: 0 1.5rem; line-height: 1.6; color: #0f172a; }
            @media (prefers-color-scheme: dark) {
              body { background: #020617; color: #f1f5f9; }
              a { color: #7dd3fc; }
            }
            h1 { font-size: 1.5rem; }
            a { color: #0284c7; }
            ul { padding-left: 1.2rem; }
            li { margin: 0.5rem 0; }
            code { background: rgba(100,116,139,0.15); padding: 0.1em 0.35em; border-radius: 0.25em; font-size: 0.9em; }
          </style>
          <h1>OpenELIS Global — Spec Canvases</h1>
          <p>Interactive overview canvases generated by <code>/speckit.overview</code> for in-progress and shipped features. Each canvas is a single-page interactive view of the feature's SpecKit artifacts.</p>
          <ul>
          HTML
          for d in $(find canvases-stage/specs -mindepth 1 -maxdepth 1 -type d | sort); do
            feature=$(basename "$d")
            [ "$feature" = "index.html" ] && continue
            if [ -f "$d/canvas/overview.html" ]; then
              echo "          <li><a href=\"$feature/canvas/overview.html\">$feature</a></li>" >> canvases-stage/specs/index.html
            fi
          done
          cat >> canvases-stage/specs/index.html <<'HTML'
          </ul>
          <p style="margin-top: 3rem; font-size: 0.85em; color: #64748b;">
            Source: <a href="https://github.com/DIGI-UW/OpenELIS-Global-2">DIGI-UW/OpenELIS-Global-2</a> ·
            Generated by <code>.github/workflows/canvases.yml</code>
          </p>
          HTML
          cat canvases-stage/specs/index.html

      - name: Deploy to gh-pages
        if: hashFiles('canvases-stage/**') != ''
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: canvases-stage
          target-folder: .
          clean: false
          single-commit: false
          commit-message: "Publish spec canvases from ${{ github.sha }}"
