# Invoked by e2e-playwright.yml (every PR) and e2e-playwright-analyzer-harness-manual.yml (workflow_dispatch).
# When called from e2e-playwright.yml, shared-build has already run and published
# e2e-image-map + e2e-plugin-jars artifacts. This workflow consumes those.
name: E2E / Playwright / Analyzer Harness (Reusable)

on:
  workflow_call:

permissions:
  contents: read
  packages: read

jobs:
  test-shards:
    name: Shard ${{ matrix.shard_index }}/${{ matrix.shard_total }}
    runs-on: ubuntu-latest
    environment: e2e
    strategy:
      fail-fast: false
      matrix:
        include:
          - shard_index: 1
            shard_total: 2
          - shard_index: 2
            shard_total: 2

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Restore Playwright browser cache
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('frontend/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps
        working-directory: frontend

      - name: Prepare .env
        run: cp .env.example .env

      - name: Download plugin jars artifact
        uses: actions/download-artifact@v4
        with:
          name: e2e-plugin-jars
          path: /tmp/e2e-plugin-jars

      - name: Download Docker image map artifact
        uses: actions/download-artifact@v4
        with:
          name: e2e-image-map
          path: /tmp/e2e-image-map

      - name: Restore plugin jars for runtime loading
        run: |
          mkdir -p volume/plugins
          rm -rf volume/plugins/*
          cp /tmp/e2e-plugin-jars/*.jar volume/plugins/
          ls -lah volume/plugins

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull and retag prebuilt compose images
        run: |
          xargs -r -I{} -P4 bash -lc '
            IFS="|" read -r source_image ghcr_image <<< "$1"
            [ -z "$source_image" ] && exit 0
            docker pull "$ghcr_image" >/dev/null
            docker tag "$ghcr_image" "$source_image"
          ' _ {} < /tmp/e2e-image-map/e2e-image-map.txt

      - name: Create analyzer import bind mount directories
        run: mkdir -p projects/analyzer-harness/volume/analyzer-imports

      - name: Start analyzer harness stack (no rebuild)
        run: docker compose -f build.docker-compose.yml -f .github/ci/ci.analyzer-harness.yml up -d --no-build --wait --wait-timeout 900

      - name: Wait for OpenELIS, bridge, and simulator readiness
        run: |
          timeout 120 bash -c 'until curl -k -s -f https://localhost/ > /dev/null; do sleep 2; done'
          timeout 120 bash -c 'until curl -s -f http://localhost:8442/actuator/health > /dev/null; do sleep 2; done'
          timeout 120 bash -c 'until curl -s -f http://localhost:8085/health > /dev/null; do sleep 2; done'

      - name: "Load test fixtures (parity with local: foundational + analyzer types + cleanup + storage)"
        run: ./src/test/resources/load-test-fixtures.sh --analyzers=full --no-verify

      - name: Seed analyzers via REST API (profile-based test mappings + bridge registration)
        run: bash projects/analyzer-harness/seed-analyzers.sh
        env:
          BASE_URL: https://localhost
          TEST_USER: ${{ vars.TEST_USER || 'admin' }}
          TEST_PASS: ${{ secrets.TEST_PASS }}

      - name: Run analyzer Playwright harness shard
        run: npm run pw:test -- --project=harness --shard=${{ matrix.shard_index }}/${{ matrix.shard_total }}
        working-directory: frontend
        env:
          CI: true
          ANALYZER_HARNESS: "true"
          BASE_URL: https://localhost
          TEST_USER: ${{ vars.TEST_USER || 'admin' }}
          TEST_PASS: ${{ secrets.TEST_PASS }}

      - name: Upload blob report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: analyzer-blob-report-${{ matrix.shard_index }}
          path: frontend/blob-report
          if-no-files-found: ignore
          retention-days: 1

      - name: Upload failure screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: analyzer-playwright-screenshots-shard-${{ matrix.shard_index }}
          path: frontend/test-results/**/test-failed-*.png
          retention-days: 7
          if-no-files-found: ignore

      - name: Upload test traces
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: analyzer-playwright-traces-shard-${{ matrix.shard_index }}
          path: frontend/test-results/**/trace.zip
          retention-days: 7
          if-no-files-found: ignore

      - name: Dump docker logs on failure
        if: failure()
        uses: jwalton/gh-docker-logs@v2
        with:
          tail: "200"

  demo-shards:
    name: Demo ${{ matrix.shard_index }}/${{ matrix.shard_total }}
    runs-on: ubuntu-latest
    environment: e2e
    strategy:
      fail-fast: false
      matrix:
        include:
          - shard_index: 1
            shard_total: 2
          - shard_index: 2
            shard_total: 2
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Restore Playwright browser cache
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('frontend/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps
        working-directory: frontend

      - name: Prepare .env
        run: cp .env.example .env

      - name: Download plugin jars artifact
        uses: actions/download-artifact@v4
        with:
          name: e2e-plugin-jars
          path: /tmp/e2e-plugin-jars

      - name: Download Docker image map artifact
        uses: actions/download-artifact@v4
        with:
          name: e2e-image-map
          path: /tmp/e2e-image-map

      - name: Restore plugin jars for runtime loading
        run: |
          mkdir -p volume/plugins
          rm -rf volume/plugins/*
          cp /tmp/e2e-plugin-jars/*.jar volume/plugins/
          ls -lah volume/plugins

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull and retag prebuilt compose images
        run: |
          xargs -r -I{} -P4 bash -lc '
            IFS="|" read -r source_image ghcr_image <<< "$1"
            [ -z "$source_image" ] && exit 0
            docker pull "$ghcr_image" >/dev/null
            docker tag "$ghcr_image" "$source_image"
          ' _ {} < /tmp/e2e-image-map/e2e-image-map.txt

      - name: Create analyzer import bind mount directories
        run: mkdir -p projects/analyzer-harness/volume/analyzer-imports

      - name: Start analyzer harness stack (no rebuild)
        run: docker compose -f build.docker-compose.yml -f .github/ci/ci.analyzer-harness.yml up -d --no-build --wait --wait-timeout 900

      - name: Wait for OpenELIS, bridge, and simulator readiness
        run: |
          timeout 120 bash -c 'until curl -k -s -f https://localhost/ > /dev/null; do sleep 2; done'
          timeout 120 bash -c 'until curl -s -f http://localhost:8442/actuator/health > /dev/null; do sleep 2; done'
          timeout 120 bash -c 'until curl -s -f http://localhost:8085/health > /dev/null; do sleep 2; done'

      - name: "Load test fixtures (parity with local: foundational + analyzer types + cleanup + storage)"
        run: ./src/test/resources/load-test-fixtures.sh --analyzers=full --no-verify

      - name: Seed analyzers via REST API (profile-based test mappings + bridge registration)
        run: bash projects/analyzer-harness/seed-analyzers.sh
        env:
          BASE_URL: https://localhost
          TEST_USER: ${{ vars.TEST_USER || 'admin' }}
          TEST_PASS: ${{ secrets.TEST_PASS }}

      - name: Run analyzer Playwright demo workflow
        run: npm run pw:test -- --project=demo --shard=${{ matrix.shard_index }}/${{ matrix.shard_total }}
        working-directory: frontend
        env:
          CI: true
          ANALYZER_HARNESS: "true"
          BASE_URL: https://localhost
          TEST_USER: ${{ vars.TEST_USER || 'admin' }}
          TEST_PASS: ${{ secrets.TEST_PASS }}

      - name: Upload blob report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: analyzer-blob-report-demo-${{ matrix.shard_index }}
          path: frontend/blob-report
          if-no-files-found: ignore
          retention-days: 1

      - name: Upload failure screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: analyzer-playwright-screenshots-demo-${{ matrix.shard_index }}
          path: frontend/test-results/**/test-failed-*.png
          retention-days: 7
          if-no-files-found: ignore

      - name: Upload test traces
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: analyzer-playwright-traces-demo-${{ matrix.shard_index }}
          path: frontend/test-results/**/trace.zip
          retention-days: 7
          if-no-files-found: ignore

      - name: Dump docker logs on failure
        if: failure()
        uses: jwalton/gh-docker-logs@v2
        with:
          tail: "200"

  merge-reports:
    name: Report Merge
    if: ${{ always() && !cancelled() }}
    needs: [test-shards, demo-shards]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Download blob reports from shard jobs
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          path: frontend/all-blob-reports
          pattern: analyzer-blob-report-*
          merge-multiple: true

      - name: Resolve Playwright version for report merge
        id: playwright-version
        working-directory: frontend
        run: |
          VERSION=$(node -e "const lock=require('./package-lock.json'); const pkg=require('./package.json'); const clean=(s)=>s?String(s).replace(/^[~^]/,''):''; const v=(lock.packages?.['node_modules/playwright']?.version)||(lock.packages?.['node_modules/@playwright/test']?.version)||clean(pkg.devDependencies?.['@playwright/test'])||clean(pkg.dependencies?.playwright); if(!v){console.error('Unable to resolve Playwright version for report merge'); process.exit(1);} process.stdout.write(v);")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Using Playwright version: $VERSION"

      - name: Merge blob reports into HTML report when artifacts exist
        run: |
          if [ -d ./all-blob-reports ] && [ -n "$(ls -A ./all-blob-reports 2>/dev/null)" ]; then
            npx --yes playwright@${{ steps.playwright-version.outputs.version }} merge-reports --reporter html ./all-blob-reports
          else
            echo "No blob reports available; skipping merge."
          fi
        working-directory: frontend

      - name: Upload merged HTML report
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: analyzer-playwright-report-html-attempt-${{ github.run_attempt }}
          path: frontend/playwright-report/
          if-no-files-found: ignore
          retention-days: 14

  analyzer-e2e-gate:
    name: Checkpoint
    if: always()
    needs: [test-shards, demo-shards, merge-reports]
    runs-on: ubuntu-latest
    steps:
      - name: Enforce shard, demo, and merge success
        run: |
          if [[ "${{ needs.test-shards.result }}" != "success" ]]; then
            echo "Analyzer shard jobs failed: ${{ needs.test-shards.result }}"
            exit 1
          fi
          if [[ "${{ needs.demo-shards.result }}" != "success" ]]; then
            echo "Analyzer demo shard jobs failed: ${{ needs.demo-shards.result }}"
            exit 1
          fi
          if [[ "${{ needs.merge-reports.result }}" != "success" ]]; then
            echo "Merge reports job failed: ${{ needs.merge-reports.result }}"
            exit 1
          fi
          echo "Analyzer E2E required gate passed."
