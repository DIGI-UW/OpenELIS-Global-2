# Builds and publishes production images for long-lived non-develop branches
# that need distro-compatible image tags (e.g. demo-silnas).
#
# Produces the same image names as publish-images.yml (no -dev- infix):
#   itechuw/openelis-global-2:<branch>
#   itechuw/openelis-global-2-frontend:<branch>
#
# Does NOT run the E2E gate — intended for demo/staging branches only.

name: Publishing / Branch Images / Production

on:
  push:
    branches: [demo-silnas]
  workflow_dispatch:

env:
  REGISTRY: docker.io
  DOCKER_NAME: ${{ vars.DOCKERHUB_USERNAME }}/openelis-global-2

jobs:
  # ── Backend ────────────────────────────────────────────────────────────────
  build-backend:
    if: ${{ github.repository == 'DIGI-UW/OpenELIS-Global-2' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        platform: [amd64, arm64]
    permissions:
      contents: read
      packages: write
    outputs:
      image_name: ${{ steps.prep.outputs.image_name }}
    steps:
      - name: Prepare
        id: prep
        run: |
          platform=linux/${{ matrix.platform }}
          echo "PLATFORM_PAIR=${platform//\//-}" >> $GITHUB_ENV
          slug="${{ github.ref_name }}"
          slug="${slug//\//-}"
          image_name="${{ env.DOCKER_NAME }}:${slug}"
          echo "BRANCH_IMAGE_NAME=${image_name}" >> $GITHUB_ENV
          echo "image_name=${image_name}" >> $GITHUB_OUTPUT

      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to DockerHub
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.BRANCH_IMAGE_NAME }}

      - name: Build and push backend
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/${{ matrix.platform }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-to: type=registry,ref=${{ env.DOCKER_NAME }}-buildcache:backend-${{ matrix.platform }},mode=max
          outputs: type=image,name=${{ env.BRANCH_IMAGE_NAME }},push-by-digest=true,name-canonical=true,push=true

      - name: Export digest
        run: |
          mkdir -p /tmp/digests/backend
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/backend/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v6
        with:
          name: digests-${{ env.PLATFORM_PAIR }}-backend
          path: /tmp/digests/backend/*
          if-no-files-found: error
          retention-days: 1

  merge-backend:
    if: ${{ github.repository == 'DIGI-UW/OpenELIS-Global-2' }}
    runs-on: ubuntu-latest
    needs: build-backend
    steps:
      - name: Download digests
        uses: actions/download-artifact@v6
        with:
          path: /tmp/digests/backend
          pattern: digests-*-backend
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ needs.build-backend.outputs.image_name }}

      - name: Login to DockerHub
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Create manifest list and push
        working-directory: /tmp/digests/backend
        run: |
          docker buildx imagetools create $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf '${{ needs.build-backend.outputs.image_name }}@sha256:%s ' *)

      - name: Inspect image
        run: |
          docker buildx imagetools inspect ${{ needs.build-backend.outputs.image_name }}:${{ steps.meta.outputs.version }}

  # ── Frontend ───────────────────────────────────────────────────────────────
  build-frontend:
    if: ${{ github.repository == 'DIGI-UW/OpenELIS-Global-2' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        platform: [amd64, arm64]
    permissions:
      contents: read
      packages: write
    outputs:
      image_name: ${{ steps.prep.outputs.image_name }}
    steps:
      - name: Prepare
        id: prep
        run: |
          platform=linux/${{ matrix.platform }}
          echo "PLATFORM_PAIR=${platform//\//-}" >> $GITHUB_ENV
          slug="${{ github.ref_name }}"
          slug="${slug//\//-}"
          image_name="${{ env.DOCKER_NAME }}-frontend:${slug}"
          echo "BRANCH_IMAGE_NAME=${image_name}" >> $GITHUB_ENV
          echo "image_name=${image_name}" >> $GITHUB_OUTPUT

      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to DockerHub
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.BRANCH_IMAGE_NAME }}

      - name: Build and push frontend
        id: build
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          # No target: defaults to final stage = runtime (nginx serving built SPA)
          platforms: linux/${{ matrix.platform }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-to: type=registry,ref=${{ env.DOCKER_NAME }}-buildcache:frontend-${{ matrix.platform }},mode=max
          outputs: type=image,name=${{ env.BRANCH_IMAGE_NAME }},push-by-digest=true,name-canonical=true,push=true

      - name: Export digest
        run: |
          mkdir -p /tmp/digests/frontend
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/frontend/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v6
        with:
          name: digests-${{ env.PLATFORM_PAIR }}-frontend
          path: /tmp/digests/frontend/*
          if-no-files-found: error
          retention-days: 1

  merge-frontend:
    if: ${{ github.repository == 'DIGI-UW/OpenELIS-Global-2' }}
    runs-on: ubuntu-latest
    needs: build-frontend
    steps:
      - name: Download digests
        uses: actions/download-artifact@v6
        with:
          path: /tmp/digests/frontend
          pattern: digests-*-frontend
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ needs.build-frontend.outputs.image_name }}

      - name: Login to DockerHub
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Create manifest list and push
        working-directory: /tmp/digests/frontend
        run: |
          docker buildx imagetools create $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf '${{ needs.build-frontend.outputs.image_name }}@sha256:%s ' *)

      - name: Inspect image
        run: |
          docker buildx imagetools inspect ${{ needs.build-frontend.outputs.image_name }}:${{ steps.meta.outputs.version }}
