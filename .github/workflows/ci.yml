name: OpenELIS-Global-2 CI Build
on:
  push:
    branches: [develop]
  pull_request:
     branches: [develop]
  workflow_dispatch:

jobs:
  checkFormat-build-unitTest-and-run:
    runs-on: ubuntu-latest
    steps:
      - name: Set up JDK 21
        uses: actions/setup-java@v1
        with:
          java-version: 21
      - name: Cache local Maven repository
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Checkout OpenELIS-Global2
        uses: actions/checkout@v2
        with:
          repository: ${{github.repository}}
          submodules: recursive

      - name: Verify SpecKit commands compile correctly
        run: |
          # Install SpecKit commands
          ./.specify/scripts/bash/install-commands.sh -y all
          
          # Verify all 9 commands exist in both agent directories
          EXPECTED_COMMANDS="speckit.analyze speckit.checklist speckit.clarify speckit.constitution speckit.implement speckit.plan speckit.specify speckit.tasks speckit.taskstoissues"
          for cmd in $EXPECTED_COMMANDS; do
            if [ ! -f ".cursor/commands/${cmd}.md" ]; then
              echo "ERROR: Missing .cursor/commands/${cmd}.md"
              exit 1
            fi
            if [ ! -f ".claude/commands/${cmd}.md" ]; then
              echo "ERROR: Missing .claude/commands/${cmd}.md"
              exit 1
            fi
          done
          
          # Verify no invalid path patterns in compiled commands
          if grep -r '/.specify/' .cursor/commands/ .claude/commands/ 2>/dev/null; then
            echo "ERROR: Found invalid '/.specify/' paths in compiled commands"
            exit 1
          fi
          if grep -r '.specify/.specify/' .cursor/commands/ .claude/commands/ 2>/dev/null; then
            echo "ERROR: Found invalid '.specify/.specify/' paths in compiled commands"
            exit 1
          fi
          
          echo "SpecKit commands compiled successfully (9 commands × 2 agents)"

      - name: check formatting
        run: mvn spotless:check

      - name: Initialize and build submodules
        run: |
          cd dataexport
          mvn clean install 
          cd ..

      - name: Build OpenELIS-Global2
        run: mvn clean install -Dspotless.check.skip=true

      - name: Generate JaCoCo Badge
        if: github.event_name == 'push'
        uses: cicirello/jacoco-badge-generator@v2
        with:
          jacoco-csv-file: target/site/jacoco/jacoco.csv
          badges-directory: target/html/badges

      - name: Fix permissions
        if: github.event_name == 'push'
        run: |
              sudo chown -R $(whoami):$(whoami) target/html
              sudo chmod -R 755 target/html  # Read-write for owner, read for others

      - name: Check coverage report exists
        if: github.event_name == 'push'
        run: ls -lah target/html || echo "Coverage report not found!"     

      - name: Publish coverage report to GitHub Pages
        if: github.event_name == 'push'
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: target/html/
