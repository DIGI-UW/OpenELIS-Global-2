name: E2E / Playwright

on:
  pull_request:
    branches: [develop]
  workflow_dispatch:

jobs:
  # Analyzer harness must run in this workflow on PRs.
  # The standalone analyzer harness workflow remains manual-only.
  analyzer-harness-e2e:
    name: Analyzer Harness
    # Optional PR opt-out: apply label `skip-analyzer-e2e`.
    if: ${{ github.event_name != 'pull_request' || !contains(github.event.pull_request.labels.*.name, 'skip-analyzer-e2e') }}
    uses: ./.github/workflows/e2e-playwright-analyzer-harness-reusable.yml
    secrets: inherit

  playwright-tests:
    name: Core
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: e2e

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps
        working-directory: frontend

      # Use .env.example as single source of truth: copy to .env so Docker Compose
      # loads it for ${VAR} substitution (OE_DB_PASSWORD, SSL_*, etc.).
      - name: Prepare .env from template
        run: cp .env.example .env

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build OpenELIS images (cached)
        uses: docker/bake-action@v5
        with:
          files: build.docker-compose.yml
          load: true
          set: |
            *.cache-from=type=gha,scope=playwright-core
            *.cache-to=type=gha,scope=playwright-core,mode=max

      - name: Start OpenELIS containers (no rebuild)
        run: docker compose -f build.docker-compose.yml up -d --no-build --wait --wait-timeout 600

      - name: Wait for application to be ready
        run: |
          echo "Waiting for application to respond..."
          timeout 60 bash -c 'until curl -k -s -f https://localhost/ > /dev/null; do sleep 2; done' || exit 1
          echo "Application is ready"

      - name: Load FILE analyzer E2E fixtures (deactivate legacy types)
        run: |
          docker exec -i openelisglobal-database \
            psql -U clinlims -d clinlims \
            < src/test/resources/fixtures/file-import-e2e.sql

      - name: Create analyzer import directories in container
        run: |
          docker exec openelisglobal-webapp mkdir -p \
            /data/analyzer-imports/e2e-qs5/incoming \
            /data/analyzer-imports/e2e-qs7/incoming \
            /data/analyzer-imports/e2e-fluorocycler/incoming

      - name: Run Playwright tests
        run: npm run pw:test -- --project=core-app
        working-directory: frontend
        env:
          CI: true
          BASE_URL: https://localhost
          TEST_USER: ${{ vars.TEST_USER || 'admin' }}
          TEST_PASS: ${{ secrets.TEST_PASS }}

      - name: Upload blob report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-blob-report
          path: frontend/blob-report
          if-no-files-found: ignore
          retention-days: 1

      - name: Upload failure screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-screenshots
          path: frontend/test-results/**/test-failed-*.png
          retention-days: 7
          if-no-files-found: ignore

      - name: Upload test traces
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: frontend/test-results/**/trace.zip
          retention-days: 7
          if-no-files-found: ignore

      - name: Dump docker logs on failure
        if: failure()
        uses: jwalton/gh-docker-logs@v2
        with:
          tail: '100'

  merge-reports:
    name: Core Report
    if: ${{ always() && !cancelled() }}
    needs: playwright-tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Download blob report
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: playwright-blob-report
          path: frontend/all-blob-reports

      - name: Merge into HTML report when blob reports exist
        run: |
          if [ -d ./all-blob-reports ] && [ -n "$(ls -A ./all-blob-reports 2>/dev/null)" ]; then
            npx playwright merge-reports --reporter html ./all-blob-reports
          else
            echo "No blob reports available; skipping merge."
          fi
        working-directory: frontend

      - name: Upload merged HTML report
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-html-attempt-${{ github.run_attempt }}
          path: frontend/playwright-report/
          if-no-files-found: ignore
          retention-days: 14

  playwright-e2e-gate:
    name: 00 Required Checkpoint (Playwright)
    if: always()
    needs: [playwright-tests, merge-reports, analyzer-harness-e2e]
    runs-on: ubuntu-latest
    steps:
      - name: Enforce core Playwright, analyzer harness, and merge success
        run: |
          if [[ "${{ needs.playwright-tests.result }}" != "success" ]]; then
            echo "Playwright tests job failed: ${{ needs.playwright-tests.result }}"
            exit 1
          fi
          if [[ "${{ needs.merge-reports.result }}" != "success" ]]; then
            echo "Report merge job failed: ${{ needs.merge-reports.result }}"
            exit 1
          fi
          if [[ "${{ needs.analyzer-harness-e2e.result }}" != "success" && "${{ needs.analyzer-harness-e2e.result }}" != "skipped" ]]; then
            echo "Analyzer E2E harness failed: ${{ needs.analyzer-harness-e2e.result }}"
            exit 1
          fi
          echo "Playwright E2E required gate passed (core + analyzer harness)."
