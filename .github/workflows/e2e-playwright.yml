name: 03 - E2E

on:
  pull_request:
    branches: [develop]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  # ─── Shared Build ───────────────────────────────────────────────────────────
  # Single image producer for the entire E2E run. All downstream jobs
  # (Playwright core, analyzer harness shards, Cypress shards) pull from
  # the image-map artifact this job publishes.
  shared-build:
    name: Shared Build
    runs-on: ubuntu-latest
    environment: e2e
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Prepare .env
        run: cp .env.example .env

      - name: Build OpenELIS artifacts for plugin compilation
        run: |
          cd dataexport/dataexport-core
          mvn clean install -DskipTests -Dmaven.test.skip=true
          cd ..
          mvn clean install -DskipTests -Dmaven.test.skip=true
          cd ..
          mvn clean install -DskipTests -Dspotless.check.skip=true -Dfix.version=3

      - name: Build plugins
        run: mvn clean install -DskipTests -Dmaven.test.skip=true
        working-directory: plugins

      - name: Stage plugin jars for runtime loading
        run: |
          rm -rf volume/plugins/*
          find plugins/analyzers -type f -path "*/target/*.jar" \
            ! -name "*sources.jar" ! -name "*javadoc.jar" \
            -exec cp {} volume/plugins/ \;
          ls -lah volume/plugins

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build all compose images (cached)
        uses: docker/bake-action@v5
        with:
          files: |
            build.docker-compose.yml
            .github/ci/ci.analyzer-harness.yml
          load: true
          set: |
            *.cache-from=type=gha,scope=e2e-shared
            *.cache-to=type=gha,scope=e2e-shared,mode=max

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Tag and push compose images to GHCR
        run: |
          TAG="sha-${GITHUB_SHA}"
          OWNER_LOWER="$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')"
          docker compose -f build.docker-compose.yml -f .github/ci/ci.analyzer-harness.yml config --images | sort -u > /tmp/e2e-images.txt
          : > /tmp/e2e-image-map.txt
          while IFS= read -r image; do
            [ -z "$image" ] && continue
            if docker image inspect "$image" >/dev/null 2>&1; then
              image_repo="$(echo "$image" | tr '[:upper:]' '[:lower:]' | sed 's|[^a-z0-9._/-]|-|g')"
              ghcr_image="ghcr.io/${OWNER_LOWER}/openelis-global-2/e2e-cache/${image_repo}:${TAG}"
              docker tag "$image" "$ghcr_image"
              docker push "$ghcr_image"
              printf "%s|%s\n" "$image" "$ghcr_image" >> /tmp/e2e-image-map.txt
            else
              echo "WARN: skipping $image (not built locally)"
            fi
          done < /tmp/e2e-images.txt
          if [ ! -s /tmp/e2e-image-map.txt ]; then
            echo "No locally available images were pushed to GHCR."
            exit 1
          fi
          echo "Pushed image mappings:"
          cat /tmp/e2e-image-map.txt

      - name: Upload plugin jars artifact
        uses: actions/upload-artifact@v4
        with:
          name: e2e-plugin-jars
          path: volume/plugins/*.jar
          if-no-files-found: error
          retention-days: 1

      - name: Upload Docker image map artifact
        uses: actions/upload-artifact@v4
        with:
          name: e2e-image-map
          path: /tmp/e2e-image-map.txt
          if-no-files-found: error
          retention-days: 1

  # ─── Playwright Core (sharded) ──────────────────────────────────────────────
  playwright-core:
    name: Playwright Core ${{ matrix.shard_index }}/${{ matrix.shard_total }}
    needs: shared-build
    runs-on: ubuntu-latest
    environment: e2e
    strategy:
      fail-fast: false
      matrix:
        include:
          - shard_index: 1
            shard_total: 2
          - shard_index: 2
            shard_total: 2
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps
        working-directory: frontend

      - name: Prepare .env from template
        run: cp .env.example .env

      - name: Download Docker image map artifact
        uses: actions/download-artifact@v4
        with:
          name: e2e-image-map
          path: /tmp/e2e-image-map

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull and retag prebuilt compose images
        run: |
          while IFS='|' read -r source_image ghcr_image; do
            [ -z "$source_image" ] && continue
            docker pull "$ghcr_image"
            docker tag "$ghcr_image" "$source_image"
          done < /tmp/e2e-image-map/e2e-image-map.txt

      - name: Start OpenELIS containers (no rebuild)
        run: docker compose -f build.docker-compose.yml up -d --no-build --wait --wait-timeout 600

      - name: Wait for application to be ready
        run: |
          echo "Waiting for application to respond..."
          timeout 60 bash -c 'until curl -k -s -f https://localhost/ > /dev/null; do sleep 2; done' || exit 1
          echo "Application is ready"

      - name: Load FILE analyzer E2E fixtures (deactivate legacy types)
        run: |
          docker exec -i openelisglobal-database \
            psql -U clinlims -d clinlims \
            < src/test/resources/fixtures/file-import-e2e.sql

      - name: Create analyzer import directories in container
        run: |
          docker exec openelisglobal-webapp mkdir -p \
            /data/analyzer-imports/e2e-qs5/incoming \
            /data/analyzer-imports/e2e-qs7/incoming \
            /data/analyzer-imports/e2e-fluorocycler/incoming

      - name: Run Playwright tests
        run: npm run pw:test -- --project=core-app --shard=${{ matrix.shard_index }}/${{ matrix.shard_total }}
        working-directory: frontend
        env:
          CI: true
          BASE_URL: https://localhost
          TEST_USER: ${{ vars.TEST_USER || 'admin' }}
          TEST_PASS: ${{ secrets.TEST_PASS }}

      - name: Upload blob report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-core-blob-report-${{ matrix.shard_index }}
          path: frontend/blob-report
          if-no-files-found: ignore
          retention-days: 1

      - name: Upload failure screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-core-screenshots-${{ matrix.shard_index }}
          path: frontend/test-results/**/test-failed-*.png
          retention-days: 7
          if-no-files-found: ignore

      - name: Upload test traces
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-core-traces-${{ matrix.shard_index }}
          path: frontend/test-results/**/trace.zip
          retention-days: 7
          if-no-files-found: ignore

      - name: Dump docker logs on failure
        if: failure()
        uses: jwalton/gh-docker-logs@v2
        with:
          tail: "100"

  # ─── Analyzer Harness ──────────────────────────────────────────────────────
  analyzer-harness:
    name: Analyzer Harness
    if: ${{ github.event_name != 'pull_request' || !contains(github.event.pull_request.labels.*.name, 'skip-analyzer-e2e') }}
    needs: shared-build
    uses: ./.github/workflows/e2e-playwright-analyzer-harness-reusable.yml
    secrets: inherit

  # ─── Cypress (Deprecated) ──────────────────────────────────────────────────
  cypress:
    name: Cypress
    needs: shared-build
    uses: ./.github/workflows/e2e-cypress-deprecated.yml
    secrets: inherit

  # ─── Gate ──────────────────────────────────────────────────────────────────
  e2e-gate:
    name: Required
    if: always()
    needs: [playwright-core, analyzer-harness, cypress]
    runs-on: ubuntu-latest
    steps:
      - name: Enforce all E2E results
        run: |
          if [[ "${{ needs.playwright-core.result }}" != "success" ]]; then
            echo "Playwright Core failed: ${{ needs.playwright-core.result }}"
            exit 1
          fi
          if [[ "${{ needs.analyzer-harness.result }}" != "success" && "${{ needs.analyzer-harness.result }}" != "skipped" ]]; then
            echo "Analyzer Harness failed: ${{ needs.analyzer-harness.result }}"
            exit 1
          fi
          if [[ "${{ needs.cypress.result }}" != "success" ]]; then
            echo "Cypress failed: ${{ needs.cypress.result }}"
            exit 1
          fi
          echo "E2E gate passed."
