name: Publish PROD images to GHCR (on GitHub Release)

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  publish-prod:
    uses: ./.github/workflows/publish-ghcr.yml
    permissions:
      contents: read
      packages: write
    with:
      tag: ${{ github.ref_name }}
      build_all: false
      include_sha_tag: false
      include_latest_tag: true
