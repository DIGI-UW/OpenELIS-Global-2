name: Validation / SpecKit
on:
  pull_request:
    # Run on PRs to any branch when command or skill sources change
    paths:
      - '.specify/**'
      - '.ai/**'
      - '.cursor/**'
      - '.claude/**'
      - 'scripts/install-agent-skills.py'
      - 'scripts/install-speckit-commands.py'
  push:
    branches: [develop]
    paths:
      - '.specify/**'
      - '.ai/**'
      - 'scripts/install-agent-skills.py'
      - 'scripts/install-speckit-commands.py'
  workflow_dispatch:

jobs:
  validate-speckit-commands:
    name: Run
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Compile agent commands and skills
        run: python scripts/install-agent-skills.py -y all

      - name: Verify required command outputs exist
        run: |
          EXPECTED_COMMANDS="speckit.analyze speckit.checklist speckit.clarify speckit.constitution speckit.implement speckit.plan speckit.specify speckit.tasks speckit.taskstoissues plan-record-playwright write-playwright-test debug-playwright audit-playwright"
          for cmd in $EXPECTED_COMMANDS; do
            if [ ! -f ".cursor/commands/${cmd}.md" ]; then
              echo "ERROR: Missing .cursor/commands/${cmd}.md"
              exit 1
            fi
            if [ ! -f ".claude/commands/${cmd}.md" ]; then
              echo "ERROR: Missing .claude/commands/${cmd}.md"
              exit 1
            fi
          done
          echo "✓ Required commands compiled for both agents"

      - name: Verify packaged skill outputs exist
        run: |
          for target in ".cursor/skills/playwright/SKILL.md" ".claude/skills/playwright/SKILL.md"; do
            if [ ! -f "$target" ]; then
              echo "ERROR: Missing packaged skill artifact: $target"
              exit 1
            fi
          done
          echo "✓ Packaged skill artifacts copied for both agents"

      - name: Verify no invalid path patterns
        run: |
          # Check for double-rewrite bugs (e.g., .specify/.specify/)
          if grep -r '\.specify/\.specify/' .cursor/commands/ .claude/commands/ 2>/dev/null; then
            echo "ERROR: Found invalid '.specify/.specify/' paths in compiled commands"
            exit 1
          fi
          # Check that command paths use a known source prefix (not bare templates/ or scripts/)
          # Use grep -q to properly handle exit codes when grep -v filters all matches
          if grep -E '(^|[^.])templates/' .cursor/commands/ .claude/commands/ 2>/dev/null | grep -Ev '\.specify/templates/|\.ai/skills/.*/templates/' | grep -q .; then
            echo "ERROR: Found bare 'templates/' paths (should be '.specify/templates/' or '.ai/skills/.../templates/')"
            exit 1
          fi
          echo "✓ All paths correctly formatted"

      - name: Summary
        run: |
          echo "## Agent Command Validation Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Legacy + packaged commands:** compiled" >> $GITHUB_STEP_SUMMARY
          echo "- **Packaged skills copied:** yes" >> $GITHUB_STEP_SUMMARY
          echo "- **Target agents:** Cursor, Claude Code" >> $GITHUB_STEP_SUMMARY
          echo "- **Path validation:** Passed" >> $GITHUB_STEP_SUMMARY
