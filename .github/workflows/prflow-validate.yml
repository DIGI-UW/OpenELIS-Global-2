name: PRFlow / Validate

on:
  pull_request:
    paths:
      - ".github/workflows/prflow-*.yml"
      - "scripts/prflow/**"
  push:
    branches: [feat/prflow-phase1, develop]
    paths:
      - ".github/workflows/prflow-*.yml"
      - "scripts/prflow/**"

jobs:
  validate:
    name: Shell syntax check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Bash syntax
        run: |
          if grep -r $'\r' scripts/prflow/; then
            echo "ERROR: CRLF line endings in scripts/prflow (use LF only)" >&2
            exit 1
          fi
          for f in scripts/prflow/*.sh; do
            echo "Checking $f"
            bash -n "$f"
          done

      - name: Workflow files present
        run: |
          test -f .github/workflows/prflow-classify.yml
          test -f .github/workflows/prflow-queue-digest.yml
          test -f .github/workflows/prflow-ready-dependabot.yml
          test -f .github/workflows/prflow-behind-nudge.yml
