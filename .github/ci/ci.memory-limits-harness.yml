# Docker Compose override: CI memory limits for analyzer harness services
# Used only when harness compose is active — the bridge is a Spring Boot JVM
# that will consume 2-4GB uncapped, starving Chromium.
services:
  openelis-analyzer-bridge:
    deploy:
      resources:
        limits:
          memory: 512M

  analyzer-mock:
    deploy:
      resources:
        limits:
          memory: 256M
